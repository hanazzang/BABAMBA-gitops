replicaCount: 1

image:
  repository: ghcr.io/hanazzang/photo_service
  tag: "sha-a76ad4e"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: photo-sa

service:
  port: 5003
  targetPort: 5003

# [스토리지 설정 - CephFS 비활성화]
persistence:
  enabled: false

# [신규] S3 설정 추가
s3:
  enabled: true
  region: "us-west-2"      # AWS 리전
  bucketName: "hana-photo-service-bucket-v1" # S3 버킷 이름
  secretName: "photo-s3-secret" # k8s Secret 이름 (아래 설명 참고)

ingress:
  host: api.yongun.shop

resources:
  limits:
    memory: "512Mi"
    cpu: "200m"
  requests:
    memory: "128Mi"
    cpu: "100m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70

keda:
  enabled: false
  pollingInterval: 15
  cooldownPeriod: 300
  triggers: []