replicaCount: 1

image:
  repository: ghcr.io/hanazzang/photo_service
  tag: "sha-36c997e"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: photo-sa

service:
  port: 5003
  targetPort: 5003

# [스토리지 설정]
persistence:
  enabled: true
  # 앞서 생성한 StorageClass 이름
  storageClass: "csi-cephfs-sc"
  # CephFS는 다중 접속(RWX) 가능
  accessMode: "ReadWriteMany"
  size: "2Gi"
  mountPath: "/app/static/uploads"

# [NFS 상세 정보]
pvName: "photo-service-pv"
size: "1Gi"
nfsServer: "192.168.13.187"
nfsPath: "/data/nfs/photo"

ingress:
  host: api.yongun.shop

resources:
  limits:
    memory: "512Mi"
    cpu: "200m"
  requests:
    memory: "128Mi"
    cpu: "100m"

autoscaling:
  enabled: false