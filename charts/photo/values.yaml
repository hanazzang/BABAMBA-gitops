replicaCount: 1

image:
  repository: ghcr.io/hanazzang/photo_service
  tag: "sha-36c997e"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: photo-sa

service:
  port: 5003
  targetPort: 5003

# [스토리지 설정]
persistence:
  enabled: true
  storageClassName: "nfs-client"
  size: 1Gi
  mountPath: /app/static/uploads

# [NFS 상세 정보]
pvName: "photo-service-pv"
size: "1Gi"
nfsServer: "192.168.13.187"
nfsPath: "/data/nfs/photo"

ingress:
  host: api.yongun.shop

resources:
  limits:
    memory: "512Mi"
    cpu: "200m"
  requests:
    memory: "128Mi"
    cpu: "100m"

autoscaling:
  enabled: false