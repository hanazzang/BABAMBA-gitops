replicaCount: 1

image:
  repository: ghcr.io/hanazzang/photo_service
  tag: "sha-36c997e"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: photo-sa

service:
  port: 5003        # [중요] Photo 서버 포트
  targetPort: 5003

# [수정] StorageClass를 사용하는 방식으로 변경
persistence:
  enabled: true
  storageClassName: "" # standard # [중요] 클러스터에 있는 StorageClass 이름 (platform/storage 참고)
  size: 1Gi
  mountPath: /app/static/uploads

# [추가] Ingress/Gateway 설정
ingress:
  host: api.yongun.shop

resources:
  limits:
    memory: "512Mi"
    cpu: "200m"
  requests:
    memory: "128Mi"
    cpu: "100m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70