{{- if and .Values.autoscaling.enabled (not .Values.keda.enabled) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "photo-server.fullname" . }}-hpa
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    {{- include "photo-server.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    # [중요] Rollout 타겟팅
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: {{ include "photo-server.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.cpu.averageUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.memory.averageUtilization }}
{{- end }}