apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: photo-route
  namespace: photo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    # 1️⃣ /photo -> /로 rewrite
    - matches:
        - path:
            type: PathPrefix
            value: /photo
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "photo-service.fullname" . }}-active
          port: {{ .Values.service.port }}
          weight: 100

    # 2️⃣ /static/uploads -> 그대로 전달
    - matches:
        - path:
            type: PathPrefix
            value: /static/uploads
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "photo-service.fullname" . }}-active
          port: {{ .Values.service.port }}
          weight: 100