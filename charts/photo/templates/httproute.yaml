apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: photo-route
  namespace: photo
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    - ehanadul.store
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/photo
      backendRefs:
          - group: ""
            kind: Service
            name: photo-service-active
            port: 5003