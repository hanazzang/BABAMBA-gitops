apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: photo-route
  namespace: photo
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /photo
      backendRefs:
          - group: ""
            kind: Service
            name: photo-service
            port: 5003