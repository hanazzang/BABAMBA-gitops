apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "photo-service.fullname" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "2" # PV/PVC(-10, -5)보다 나중에 생성됨
  labels:
    {{- include "photo-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "photo-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "photo-service.fullname" . }}
        {{- include "photo-service.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "photo-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          
          # [스토리지 마운트]
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: photo-storage
              mountPath: {{ .Values.persistence.mountPath | default "/app/static/uploads" }}
          {{- end }}
      
      # [볼륨 정의]
      volumes:
        - name: photo-storage
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            # PVC의 이름과 정확히 매핑 (pvc.yaml의 metadata.name과 일치해야 함)
            claimName: {{ include "photo-service.fullname" . }}-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}

  # [배포 전략: BlueGreen]
  strategy:
    blueGreen:
      activeService: {{ include "photo-service.fullname" . }}-active
      previewService: {{ include "photo-service.fullname" . }}-preview
      autoPromotionEnabled: false # 수동 승인으로 안정성 확보
      scaleDownDelaySeconds: 30