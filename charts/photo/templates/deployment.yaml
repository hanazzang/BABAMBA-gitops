apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "photo-server.fullname" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    {{- include "photo-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "photo-server.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "photo-server.fullname" . }}
        {{- include "photo-server.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      
      # [선택] S3는 네트워크만 되면 되므로 특정 노드 고정 불필요 (필요시 유지)
      # nodeSelector:
      #   kubernetes.io/hostname: worker-in-ceph

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "photo-server.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          
          # [신규] S3 접속 정보 주입 (환경변수)
          {{- if .Values.s3.enabled }}
          env:
            - name: STORAGE_TYPE
              value: "s3"
            - name: AWS_REGION
              value: {{ .Values.s3.region | quote }}
            - name: AWS_S3_BUCKET
              value: {{ .Values.s3.bucketName | quote }}
            # Secret에서 Access Key 가져오기
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: access-key
            # Secret에서 Secret Key 가져오기
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: secret-key
          {{- end }}

          # [삭제됨] volumeMounts 섹션 전체 삭제
      
      # [삭제됨] volumes 섹션 전체 삭제
  
  # [Blue/Green 전략 유지]
  strategy:
    blueGreen:
      activeService: {{ include "photo-server.fullname" . }}-active
      previewService: {{ include "photo-server.fullname" . }}-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30