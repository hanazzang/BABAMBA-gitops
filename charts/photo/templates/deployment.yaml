apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "photo-service.fullname" . }}
  labels:
    {{- include "photo-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "photo-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "photo-service.fullname" . }}
        {{- include "photo-service.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: {{ include "photo-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          volumeMounts:
            - name: photo-storage
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: photo-storage
          persistentVolumeClaim:
            claimName: {{ include "photo-service.fullname" . }}-pvc