replicaCount: 1
image:
  repository: ghcr.io/hanazzang/auth_server
  tag: "sha-96f166a"
  pullPolicy: IfNotPresent


imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: auth-sa

service:
  port: 5001
  targetPort: 5001

envFrom:
  configMapRef:
    name: db-config
  configMapRef:
    name: redis-config
  secretRef:
    name: db-credentials

resources:
  limits:
    memory: "512Mi"
    cpu: "200m"
  requests:
    memory: "128Mi"
    cpu: "100m"

autoscaling:
  minReplicas: 1
  maxReplicas: 3
  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70

autoscaling:
  enabled: true