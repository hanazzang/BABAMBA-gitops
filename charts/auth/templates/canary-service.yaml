apiVersion: v1
kind: Service
metadata:
  name: {{ include "auth-server.fullname" . }}-canary
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    {{- include "auth-server.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    app: {{ include "auth-server.fullname" . }}