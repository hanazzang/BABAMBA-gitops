{{- if and .Values.monitoring.podMonitor.enabled (or (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/PodMonitor") (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1")) }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "auth-server.fullname" . }}
  annotations:
    # kube-prometheus-stack(CRD 설치) 이후에 생성되도록 순서를 뒤로 미룹니다.
    argocd.argoproj.io/sync-wave: "6"
  labels:
    {{- include "auth-server.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusReleaseLabel }}
    release: {{ . | quote }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app: {{ include "auth-server.fullname" . }}
  podMetricsEndpoints:
    - path: {{ .Values.monitoring.podMonitor.path | default "/metrics" }}
      interval: {{ .Values.monitoring.podMonitor.interval | default "15s" }}
      scrapeTimeout: {{ .Values.monitoring.podMonitor.scrapeTimeout | default "10s" }}
      targetPort: {{ .Values.service.targetPort }}
      relabelings:
        # PromQL에서 일관되게 app 라벨을 쓰기 위한 매핑
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: app
        - sourceLabels: [__meta_kubernetes_pod_label_app]
          targetLabel: app
{{- end }}
