apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: auth
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    - api.yxngjxe.store
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /auth
      backendRefs:
          - group: ""
            kind: Service
            name: auth-server-stable
            port: 5001
            weight: 100
          - group: ""
            kind: Service
            name: auth-server-canary
            port: 5001
            weight: 0