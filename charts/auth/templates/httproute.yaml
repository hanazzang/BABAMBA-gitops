apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: auth
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    - api.yongun.shop
    - ehanadul.store
    - api.ehanadul.store

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "auth-server.fullname" . }}-stable
          port: 5001
          weight: 100
        - group: ""
          kind: Service
          name: {{ include "auth-server.fullname" . }}-canary
          port: 5001
          weight: 0