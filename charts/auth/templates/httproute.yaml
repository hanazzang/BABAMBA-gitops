apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: auth
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    - api.yongun.shop
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      filters:
        # 프론트(yongun.shop)에서 api.yongun.shop/auth 로 로그인 요청 시 CORS 허용
        - type: CORS
          cors:
            allowOrigins:
              - "https://yongun.shop"
              - "http://yongun.shop"
              - "https://www.yongun.shop"
              - "http://www.yongun.shop"
            allowMethods:
              - GET
              - POST
              - OPTIONS
            allowHeaders:
              - "Content-Type"
              - "Authorization"
            allowCredentials: true
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "auth-server.fullname" . }}-stable
          port: 5001
          weight: 100
        - group: ""
          kind: Service
          name: {{ include "auth-server.fullname" . }}-canary
          port: 5001
          weight: 0