apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "employee-server.fullname" . }}-write
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{ include "employee-server.selectorLabels.write" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{ include "employee-server.selectorLabels.write" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}

  strategy:
    canary:
      stableService: {{ include "employee-server.fullname" . }}-write-stable
      canaryService: {{ include "employee-server.fullname" . }}-write-canary

      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            # ✅ WRITE 전용 HTTPRoute만 패치
            httpRoute: employee-write-route
            namespace: employee

      steps:
        - setWeight: 5
        - pause: {}
        - setWeight: 10
        - pause: {}
        - setWeight: 30
        - pause: {}
        - setWeight: 50
        - pause: {}
        - setWeight: 70
        - pause: {}
        - setWeight: 90
        - pause: {}
        - setWeight: 100
