apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: employee-options-route
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hostnames:
    - api.yongun.shop
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  rules:
    - matches:
        - method: OPTIONS
          path:
            type: PathPrefix
            value: /employee
      backendRefs:
        - kind: Service
          name: cloud-prod-employee-employee-server-get-stable
          port: 5002
          weight: 100
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Route
                value: employee-options-route
              - name: X-Rule
                value: employee-preflight
              - name: X-Method
                value: OPTIONS
              - name: X-Service
                value: employee
