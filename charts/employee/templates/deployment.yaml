apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  # 헬름 차트 이름과 상관없이 실제 배포되는 이름을 명시하거나 include를 사용합니다.
  name: {{ include "employee-server.fullname" . }}
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    {{- include "employee-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "employee-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "employee-server.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5002
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configs.dbConfig }}
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configs.dbConfig }}
                  key: DB_NAME
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configs.dbConfig }}
                  key: DB_PORT
          envFrom:
            - configMapRef:
                name: {{ .Values.configs.redisConfig }}
            - secretRef:
                name: {{ .Values.configs.dbCredentials }}
  strategy:
    canary:
      # 실제 생성된 서비스 이름(onprem-dev-employee-employee-server-stable)과 일치해야 합니다.
      stableService: onprem-dev-employee-employee-server-stable
      canaryService: onprem-dev-employee-employee-server-canary
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: employee-route
            namespace: employee
      steps:
        - setWeight: 10
        - pause: { duration: 30s }
        - setWeight: 100