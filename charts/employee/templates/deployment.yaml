apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: onprem-dev-employee-employee-server # 실제 서비스 이름과 맞춤
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: employee-server # selectorLabels 확인
  template:
    metadata:
      labels:
        app.kubernetes.io/name: employee-server
    spec:
      containers:
        - name: employee-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports:
            - containerPort: 5002 # 앱이 실제로 떠 있는 포트
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configs.dbConfig }}
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configs.dbConfig }}
                  key: DB_NAME
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configs.dbConfig }}
                  key: DB_PORT
          envFrom:
            - configMapRef:
                name: {{ .Values.configs.redisConfig }}
            - secretRef:
                name: {{ .Values.configs.dbCredentials }}
  strategy:
    canary:
      stableService: onprem-dev-employee-employee-server-stable
      canaryService: onprem-dev-employee-employee-server-canary
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: employee-route
            namespace: employee
      steps:
        - setWeight: 10
        - pause: { duration: 30s }
        - setWeight: 100