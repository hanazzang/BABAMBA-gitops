apiVersion: v1
kind: Service
metadata:
  name: {{ include "employee-server.fullname" . }}-write-stable
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    {{- include "employee-server.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    {{- include "employee-server.selectorLabels.write" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "employee-server.fullname" . }}-write-canary
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    {{- include "employee-server.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    {{- include "employee-server.selectorLabels.write" . | nindent 4 }}
