apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: employee-write-route
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    - api.yongun.shop
  rules:
    - name: employee-write
      matches:
        # ✅ /employee + WRITE 메서드만 매칭
        - path: { type: PathPrefix, value: /employee }
          method: POST
        - path: { type: PathPrefix, value: /employee }
          method: PUT
        - path: { type: PathPrefix, value: /employee }
          method: PATCH
        - path: { type: PathPrefix, value: /employee }
          method: DELETE
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Route
                value: employee-write-route
              - name: X-Method
                value: WRITE
              - name: X-Service
                value: employee
      backendRefs:
        # ✅ WRITE도 stable/canary로 분배할 수 있게 구성 (Rollouts가 weight를 패치)
        - group: ""
          kind: Service
          name: {{ include "employee-server.fullname" . }}-write-stable
          port: {{ .Values.service.port }}
          weight: 100
        - group: ""
          kind: Service
          name: {{ include "employee-server.fullname" . }}-write-canary
          port: {{ .Values.service.port }}
          weight: 0