apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: employee-get-route
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    # ✅ 이 Gateway(Envoy Gateway dataplane)에 라우트를 붙임
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    # ✅ api.yongun.shop 로 들어온 요청만 대상으로
    - api.yongun.shop
  rules:
    - name: employee-get
      matches:
        # ✅ /employee + GET 요청만 매칭
        - path:
            type: PathPrefix
            value: /employee
          method: GET
      filters:
        # ✅ 기존 백엔드가 / 기준이면 /employee prefix 제거해서 전달
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        # ✅ “증거 헤더”: 어떤 라우트를 탔는지 바로 확인
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Route
                value: employee-get-route
              - name: X-Method
                value: GET
              - name: X-Service
                value: employee
      backendRefs:
        # ✅ GET 트래픽을 stable/canary로 가중치 분배 (Rollouts가 weight를 패치)
        - group: ""
          kind: Service
          name: {{ include "employee-server.fullname" . }}-get-stable
          port: {{ .Values.service.port }}
          weight: 100
        - group: ""
          kind: Service
          name: {{ include "employee-server.fullname" . }}-get-canary
          port: {{ .Values.service.port }}
          weight: 0