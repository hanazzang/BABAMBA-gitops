{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "employee-server.fullname" . }}-write
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  labels:
    {{- include "employee-server.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: {{ include "employee-server.fullname" . }}-write

  pollingInterval: {{ .Values.keda.pollingInterval | default 15 }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod | default 300 }}
  minReplicaCount: {{ .Values.autoscaling.write.minReplicas | default .Values.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.write.maxReplicas | default .Values.autoscaling.maxReplicas }}

  advanced:
    horizontalPodAutoscalerConfig:
      {{- with .Values.autoscaling.write.behavior | default .Values.autoscaling.behavior }}
      behavior:{{ toYaml . | nindent 8 }}
      {{- end }}

  triggers:
    {{- range $t := .Values.keda.write.triggers | default .Values.keda.triggers }}
    - type: {{ $t.type | quote }}
      {{- with $t.metricType }}
      metricType: {{ . | quote }}
      {{- end }}
      metadata:
        {{- range $k, $v := $t.metadata }}
        {{ $k }}: {{ tpl ($v | toString) $ | quote }}
        {{- end }}
    {{- end }}
{{- end }}
