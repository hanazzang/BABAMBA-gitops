apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: employee-route
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /employee
      backendRefs:
          - group: ""
            kind: Service
            name: employee-server-stable
            port: 5002
            weight: 100
          - group: ""
            kind: Service
            name: employee-server-canary
            port: 5002
            weight: 0