apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: employee-route
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    - api.yongun.shop
    - ehanadul.store
    - api.ehanadul.store
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /employee
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "employee-server.fullname" . }}-stable
          port: {{ .Values.service.port }} # 5002
          weight: 100
        - group: ""
          kind: Service
          name: {{ include "employee-server.fullname" . }}-canary
          port: {{ .Values.service.port }} # 5002
          weight: 0