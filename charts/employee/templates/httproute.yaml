apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: employee-route
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: service-gateway
      namespace: gateway
  hostnames:
    - api.yxngjxe.store
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/employee  # 사용자가 입력하는 실제 주소
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefix: /employee  # 앱 서버에 전달될 실제 내부 경로
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "employee-server.fullname" . }}-stable
          port: {{ .Values.service.port }}
          weight: 100
        - group: ""
          kind: Service
          name: {{ include "employee-server.fullname" . }}-canary
          port: {{ .Values.service.port }}
          weight: 0