{{- if and .Values.monitoring.podMonitor.enabled (or (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/PodMonitor") (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1")) }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "employee-server.fullname" . }}
  annotations:
    # kube-prometheus-stack(CRD 설치) 이후에 생성되도록 순서를 뒤로 미룹니다.
    argocd.argoproj.io/sync-wave: "6"
  labels:
    {{- include "employee-server.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusReleaseLabel }}
    release: {{ . | quote }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "employee-server.selectorLabels" . | nindent 6 }}
  podMetricsEndpoints:
    - path: {{ .Values.monitoring.podMonitor.path | default "/metrics" }}
      interval: {{ .Values.monitoring.podMonitor.interval | default "15s" }}
      scrapeTimeout: {{ .Values.monitoring.podMonitor.scrapeTimeout | default "10s" }}
      # NOTE: Prometheus Operator는 pod의 declared containerPort를 기반으로 타겟을 만들기 때문에
      # Rollout 템플릿에 ports(containerPort)가 반드시 존재해야 합니다.
      # (targetPort는 deprecated라 경고가 뜰 수 있지만, 현재 CRD/환경과 호환되는 방식입니다.)
      targetPort: {{ .Values.service.targetPort }}
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: app
        - sourceLabels: [__meta_kubernetes_pod_label_traffic]
          targetLabel: traffic
{{- end }}
