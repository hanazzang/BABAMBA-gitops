# 외부 ProxySQL(192.168.1.50:6033)을 employee 네임스페이스에서
# employee-mysql:3306 으로 접근할 수 있게 하는 Service + Endpoints
# (앱은 3306으로 접속하고, 실제 백엔드는 6033 포트로 전달)
---
apiVersion: v1
kind: Service
metadata:
  name: employee-mysql
  namespace: employee
spec:
  ports:
    - port: 3306
      targetPort: {{ .Values.externalDatabase.port }}
      protocol: TCP
      name: mysql
---
apiVersion: v1
kind: Endpoints
metadata:
  name: employee-mysql
  namespace: employee
subsets:
  - addresses:
      - ip: {{ .Values.externalDatabase.host | quote }}
    ports:
      - port: {{ .Values.externalDatabase.port }}
        protocol: TCP
        name: mysql
