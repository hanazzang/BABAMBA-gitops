apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "employee-server.fullname" . }}-get
  namespace: employee
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "employee-server.selectorLabels.get" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "employee-server.selectorLabels.get" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          {{- $res := .Values.resources -}}
          {{- if and (hasKey .Values "resourcesByTraffic") (hasKey .Values.resourcesByTraffic "get") -}}
          {{- $res = .Values.resourcesByTraffic.get -}}
          {{- end }}
          resources:
            {{- toYaml $res | nindent 12 }}

  strategy:
    canary:
      # ✅ Rollouts가 stable/canary 서비스 weight를 조정
      stableService: {{ include "employee-server.fullname" . }}-get-stable
      canaryService: {{ include "employee-server.fullname" . }}-get-canary

      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            # ✅ GET 전용 HTTPRoute만 패치하도록 변경
            httpRoute: employee-get-route
            namespace: employee

      # fastPromotion=true면 1단계(100%)만 사용 → 바로 풀 롤아웃
      steps:
        {{- $fast := (index (.Values.rollout | default dict) "fastPromotion") | default false }}
        {{- if $fast }}
        - setWeight: 100
        {{- else }}
        - setWeight: 5
        - pause: { duration: 5m }
        - setWeight: 10
        - pause: { duration: 5m }
        - setWeight: 30
        - pause: { duration: 10m }
        - setWeight: 50
        - pause: { duration: 10m }
        - setWeight: 70
        - pause: { duration: 10m }
        - setWeight: 90
        - pause: { duration: 10m }
        - setWeight: 100
        {{- end }}
