# 수정된 values.yaml
replicaCount: 1

image:
  repository: ghcr.io/hanazzang/employee_server
  pullPolicy: Always
  tag: "sha-29544c2"

imagePullSecrets:
  - name: ghcr-pull

service:
  type: ClusterIP
  port: 5002

containerPort: 5002

envFrom:
  - configMapRef:
      name: db-config
  - configMapRef:
      name: redis-config
  - secretRef:
      name: db-credentials

env:
- name: DB_HOST
  value: "192.168.1.50"  # ProxySQL IP
- name: DB_PORT
  value: "6033"
- name: DB_USER
  value: "kosa"
- name: DB_PASSWORD
  value: "kosa"
- name: DB_NAME
  value: "employees"