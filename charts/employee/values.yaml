replicaCount: 1

image:
  repository: ghcr.io/hanazzang/employee_server
  tag: "sha-758193e" # 최신 태그로 교체 필요할 수 있음
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: employee-sa

service:
  port: 5002        # [중요] Employee 서버 포트
  targetPort: 5002

envFrom:
  - configMapRef:
      name: db-config
  - configMapRef:
      name: redis-config
  - secretRef:
      name: db-credentials

resources:
  limits:
    memory: "512Mi"
    cpu: "200m"
  requests:
    memory: "128Mi"
    cpu: "100m"

autoscaling:
  enabled: false # 필요시 true로 변경
  minReplicas: 1
  maxReplicas: 3
  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70