# 수정된 values.yaml
replicaCount: 1

image:
  repository: ghcr.io/hanazzang/employee_server
  pullPolicy: Always
  tag: "sha-29544c2"

imagePullSecrets:
  - name: ghcr-pull

service:
  type: ClusterIP
  port: 5002

containerPort: 5002

envFrom:
  - configMapRef:
      name: db-config
  - configMapRef:
      name: redis-config
  - secretRef:
      name: db-credentials

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

    
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70