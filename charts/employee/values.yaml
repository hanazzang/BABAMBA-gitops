replicaCount: 1

image:
  repository: ghcr.io/hanazzang/employee_server
  tag: "sha-80f8613" # 최신 태그로 교체 필요할 수 있음
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: employee-sa

service:
  port: 5002        # [중요] Employee 서버 포트
  targetPort: 5002

envFrom:
  - configMapRef:
      name: db-config
  - configMapRef:
      name: redis-config
  - secretRef:
      name: db-credentials

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

    
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70
  # 실무 포인트: 스케일링 정책(플랩핑 방지)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
  get:
    maxReplicas: 10
    cpu:
      averageUtilization: 40

  write:
    maxReplicas: 3
    cpu:
      averageUtilization: 60


# Prometheus 스크랩 설정 (/metrics)
monitoring:
  prometheusReleaseLabel: ""
  podMonitor:
    enabled: false
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

# KEDA (Prometheus 트리거 기반 오토스케일)
keda:
  enabled: false
  pollingInterval: 15
  cooldownPeriod: 300
  # GET / WRITE 각각 트리거를 다르게 줄 수 있게 분리 (선택)
  get:
    triggers: []
  write:
    triggers: []
  
  # (호환용) 기존 구조도 남겨둠: get/write가 비어있으면 triggers를 fallback으로 사용
  triggers: []