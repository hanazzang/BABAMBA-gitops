apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: employee-app # 앱 이름
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hanazzang/BABAMBA-gitops
    targetRevision: jw-dev
    path: employee-server # 아까 만든 헬름 차트가 있는 폴더명
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true