apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onprem-blackbox
  namespace: argocd
  annotations:
    # kube-prometheus-stack 다음에 올라오게
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  sources:
    # 1) blackbox-exporter Helm chart
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus-blackbox-exporter
      targetRevision: 8.3.0
      helm:
        valueFiles:
          - $values/clusters/onprem/dev/platform/monitoring/values-blackbox.yaml

    # 2) Probe/Rule/Dashboard 같은 “타깃 정의/정책” 매니페스트 적용
    - repoURL: https://github.com/hanazzang/BABAMBA-gitops
      targetRevision: argos-test
      path: clusters/onprem/dev/platform/monitoring/blackbox
      directory:
        recurse: true

    # 3) values 제공용 Git ref
    - repoURL: https://github.com/hanazzang/BABAMBA-gitops
      targetRevision: argos-test
      ref: values

  syncPolicy:
    # Dev 없는 운영이므로 초기에는 보수적으로(권장)
    # 안정화되면 automated 켜도 됨
    automated: null
    # automated:
    #   prune: true
    #   selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true


