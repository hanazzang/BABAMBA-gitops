apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-csi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://ceph.github.io/csi-charts
    chart: ceph-csi-cephfs
    targetRevision: 3.16.0
    helm:
      parameters:
        # 1. 기본 접속 정보
        - name: csiConfig[0].clusterID
          value: "491b725b-d483-48ea-855a-b78b5b1bdc91"
        - name: csiConfig[0].monitors[0]
          value: "10.10.10.101:6789"
        - name: csiConfig[0].monitors[1]
          value: "10.10.10.102:6789"
        - name: csiConfig[0].monitors[2]
          value: "10.10.10.103:6789"

        # 2. [중요] 호스트 네트워크 사용 (변수명 수정됨!)
        # 아까 덤프에서 확인된 정확한 변수명입니다.
        - name: provisioner.enableHostNetwork
          value: "true"
        
        # 3. [중요] 파드 개수 1개로 고정
        # 노드가 1개인데 3개를 띄우려 해서 Pending이 떴던 겁니다.
        - name: provisioner.replicaCount
          value: "1"

        # 4. 특정 노드에만 배포 (Worker-in-ceph)
        - name: provisioner.nodeSelector.kubernetes\.io/hostname
          value: "worker-in-ceph"

        # 5. 파일시스템 이름 명시 (안전장치)
        - name: storageClass.fsName
          value: "cephfs"
          
  destination:
    server: https://kubernetes.default.svc
    namespace: ceph-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true