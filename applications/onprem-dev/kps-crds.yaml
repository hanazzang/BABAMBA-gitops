apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onprem-dev-kps-crds
  namespace: argocd
  annotations:

    argocd.argoproj.io/sync-wave: "0"


spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  source:
    repoURL: https://github.com/hanazzang/BABAMBA-gitops
    targetRevision: monitoring2-cloud


    path: platform/kps-crds/crds
    directory:
      recurse: true


  syncPolicy:
    # CRD가 없으면 PrometheusRule/ServiceMonitor 등 사용 앱이 SyncFailed 함 → 최소 1회 자동 sync 필요
    automated:
      prune: false   # CRD는 prune 비권장(기존 리소스 영향)
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - Replace=true
      - SkipSchemaValidation=true
      - Prune=false
      - ApplyOutOfSyncOnly=true


  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .status
        - .metadata.annotations