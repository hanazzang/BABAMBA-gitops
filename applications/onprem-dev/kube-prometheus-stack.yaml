apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # 릴리즈명
  name: onprem-dev-kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  sources:
    # Helm chart 소스
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      # 버전은 고정 추천
      targetRevision: 80.13.3
      helm:
        valueFiles:
          - $values/clusters/onprem/dev/platform/monitoring/values-kps.yaml

    # values 파일을 제공하는 Git 소스
    - repoURL: https://github.com/hanazzang/BABAMBA-gitops
      targetRevision: hpa
      ref: values
  
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .status
        - .metadata.annotations

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true