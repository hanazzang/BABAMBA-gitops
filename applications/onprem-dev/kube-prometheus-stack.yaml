apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onprem-dev-kube-prometheus-stack
  namespace: argocd
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  sources:
    # Helm chart 소스
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      # 버전은 고정 추천
      # 70.xx-73.xx버전이 안정화&최신 버전
      targetRevision: 80.13.3
      helm:
        valueFiles:
          - $values/clusters/onprem/dev/platform/monitoring/values-kps.yaml

    # values 파일을 제공하는 Git 소스
    - repoURL: https://github.com/hanazzang/BABAMBA-gitops
      targetRevision: main
      ref: values

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
