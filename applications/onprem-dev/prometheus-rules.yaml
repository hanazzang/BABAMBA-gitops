apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onprem-dev-prometheus-rules
  namespace: argocd
  annotations:
    # 보통 Rule은 Prometheus/CRD 이후에 올라오게 더 뒤로 둠
    argocd.argoproj.io/sync-wave: "19"
spec:
  project: default
  source:
    repoURL: https://github.com/hanazzang/BABAMBA-gitops
    targetRevision: argos-cloud
    path: platform/prometheus-rules/templates
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
