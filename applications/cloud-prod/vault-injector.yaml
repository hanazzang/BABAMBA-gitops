apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-injector
  namespace: argocd
spec:
  project: default
  source:
    chart: vault
    repoURL: https://helm.releases.hashicorp.com
    targetRevision: 0.28.0
    helm:
      values: |
        server:
          enabled: false

        injector:
          enabled: true

        global:
          externalVaultAddr: "https://vault.internal:8200"  

  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
