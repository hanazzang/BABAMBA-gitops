apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
spec:
  project: default
  destination:
    # 온프 ArgoCD가 EKS 원격 관리 시 ips.env 의 EKS_CLUSTER_URL 로 채움 (ipctl apply)
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: 2.40.5
    helm:
      releaseName: argo-rollouts
      values: |
        installCRDs: true

        controller:
          replicas: 1

          # ✅ GatewayAPI Traffic Router Plugin (argoproj-labs/gatewayAPI)
          # - initContainer가 플러그인 바이너리를 /plugins 로 복사
          # - controller는 file:// 로 플러그인을 로드
          volumes:
            - name: trafficrouter-plugins
              emptyDir: {}

          volumeMounts:
            - name: trafficrouter-plugins
              mountPath: /plugins

          initContainers:
            - name: copy-gatewayapi-plugin
              image: ghcr.io/argoproj-labs/rollouts-plugin-trafficrouter-gatewayapi:v0.5.0
              command: ["/bin/sh", "-c"]
              args:
                - cp /bin/rollouts-plugin-trafficrouter-gatewayapi /plugins/
              volumeMounts:
                - name: trafficrouter-plugins
                  mountPath: /plugins

          trafficRouterPlugins:
            - name: argoproj-labs/gatewayAPI
              location: file:///plugins/rollouts-plugin-trafficrouter-gatewayapi

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
