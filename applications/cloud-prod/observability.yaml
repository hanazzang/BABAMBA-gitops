apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-prod-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10" # KPS(에이전트) 설치 후 실행
spec:
  project: default
  source:
    repoURL: https://github.com/hanazzang/BABAMBA-gitops
    targetRevision: argos-cloud




    path: workloads/monitoring/eks # EKS용 모니터링 리소스 경로
  destination:
    # 온프 ArgoCD가 EKS 원격 관리 시 ips.env 의 EKS_CLUSTER_URL 로 채움 (ipctl apply)
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true