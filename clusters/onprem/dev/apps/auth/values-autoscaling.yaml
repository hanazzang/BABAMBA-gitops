# 시나리오 스위치
# - 0: autoscaling.enabled=false, keda.enabled=false
# - 1: autoscaling.enabled=true,  keda.enabled=false
# - 2: autoscaling.enabled=true,  keda.enabled=true  (RPS/p95)

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  # Auth는 로그인 버스트를 흡수해야 하지만,
  # 파드가 과하게 늘면 DB(ProxySQL/Galera) + Redis(Sentinel)로 병목이 이동할 수 있어 상한을 보수적으로 둡니다.
  minReplicas: 2
  maxReplicas: 6
  cpu:
    averageUtilization: 70  # CPU 기반으로 과도한 스케일을 피하고, 기본(minReplicas)로 버스트를 흡수
  memory:
    averageUtilization: 70  # Pod 평균 Memory가 70% 초과하면 scale-out
  # 실무 포인트: 스케일링 정책(플랩핑 방지)
  # - scaleUp: 빠르게 확장 (대기열이 쌓이기 전 확장)
  # - scaleDown: 천천히 축소 (트래픽 출렁임 완화)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 1
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min

monitoring:
  podMonitor:
    # KEDA(Prometheus 트리거)를 쓰려면 /metrics가 Prometheus에 수집되어야 합니다.
    enabled: true

keda:
  # KEDA를 켜면( enabled=true ) 기존 Resource HPA 대신 ScaledObject 기반으로 스케일합니다.
  enabled: true
  pollingInterval: 10  # Prometheus 질의 주기(초)
  cooldownPeriod: 120  # scale-in 지연(초). 로그인 버스트/출렁임 완충
  triggers:
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: auth_rps
        # 주의: /metrics(스크랩) 같은 내부 트래픽을 포함하면 스케일이 왜곡될 수 있어 제외합니다.
        query: >
          sum(
            rate(http_requests_total{
              namespace="{{ .Release.Namespace }}",
              app="{{ include "auth-server.name" . }}",
              path!~"/(metrics|health|ready)"
            }[30s])
          )
        # per-pod RPS 목표치(= total_rps / replicas). 데모/버스트 대응용으로 낮게 잡는 편이 반응성이 좋습니다.
        threshold: "10"

    - type: prometheus
      # p95 latency는 "replica로 나눠서 평균"내는 값이 아니므로 Value가 안전합니다.
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: auth_p95_latency_seconds
        # 트래픽이 너무 적을 때 quantile이 흔들리는 걸 피하려고 RPS 조건을 같이 둡니다.
        query: >
          (
            histogram_quantile(
              0.95,
              sum(
                rate(http_request_duration_seconds_bucket{
                  namespace="{{ .Release.Namespace }}",
                  app="{{ include "auth-server.name" . }}",
                  path!~"/(metrics|health|ready)"
                }[2m])
              ) by (le)
            )
          )
          and
          sum(
            rate(http_requests_total{
              namespace="{{ .Release.Namespace }}",
              app="{{ include "auth-server.name" . }}",
              path!~"/(metrics|health|ready)"
            }[2m])
          ) > 1
        threshold: "0.3"  # p95 latency가 300ms 초과

    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: auth_cpu_util_percent 
        query: >
          avg(
            100 *
            (
              sum by (pod) (rate(container_cpu_usage_seconds_total{namespace="{{ .Release.Namespace }}",pod=~"{{ include "auth-server.name" . }}-.*",container!="POD"}[2m]))
              /
              sum by (pod) (kube_pod_container_resource_requests{namespace="{{ .Release.Namespace }}",pod=~"{{ include "auth-server.name" . }}-.*",resource="cpu",unit="core"})
            )
          )
        threshold: "85"  # CPU 사용률 (Prometheus 기반)

    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: auth_mem_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}",pod=~"{{ include "auth-server.name" . }}-.*",container!="POD"})
              /
              sum by (pod) (kube_pod_container_resource_requests{namespace="{{ .Release.Namespace }}",pod=~"{{ include "auth-server.name" . }}-.*",resource="memory",unit="byte"})
            )
          )
        threshold: "70"  # Memory 사용률 (Prometheus 기반)

