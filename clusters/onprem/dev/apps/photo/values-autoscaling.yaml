# 시나리오 스위치
# - 0: autoscaling.enabled=false
# - 1: autoscaling.enabled=true
# - 2: autoscaling.enabled=true, keda.enabled=true (RPS/p95 + CPU% + MEM%)

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpu:
    averageUtilization: 65
  memory:
    averageUtilization: 75
  # 업로드(프록시) 트래픽은 피크가 크고 외부(S3) 의존이 있어,
  # scale-up은 빠르게 / scale-down은 느리게 가져가 플랩핑을 줄입니다.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
        - type: Percent
          value: 100
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 120   # 테스트를 위해 낮게잡음. 600
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Min

keda:
  enabled: false
  pollingInterval: 15
  # scale-to-zero(0으로 축소) 구간에서 특히 의미가 큰 완충값입니다.
  # minReplicas>0이면 1~N 스케일인은 주로 HPA behavior(scaleDown)가 결정합니다.
  cooldownPeriod: 120
  triggers:
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://kps-prometheus.monitoring.svc:9090
        metricName: photo_rps
        query: 'sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}",app="{{ include "photo-server.fullname" . }}"}[1m]))'
        threshold: "20"

    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://kps-prometheus.monitoring.svc:9090
        metricName: photo_p95_latency_seconds
        query: 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}",app="{{ include "photo-server.fullname" . }}"}[5m])) by (le))'
        threshold: "0.3"

    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://kps-prometheus.monitoring.svc:9090
        metricName: photo_cpu_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (rate(container_cpu_usage_seconds_total{namespace="{{ .Release.Namespace }}",pod=~"{{ include "photo-server.fullname" . }}-.*",container!="POD"}[2m]))
              /
              sum by (pod) (kube_pod_container_resource_requests{namespace="{{ .Release.Namespace }}",pod=~"{{ include "photo-server.fullname" . }}-.*",resource="cpu",unit="core"})
            )
          )
        threshold: "85"

    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: photo_mem_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}",pod=~"{{ include "photo-server.fullname" . }}-.*",container!="POD"})
              /
              sum by (pod) (kube_pod_container_resource_requests{namespace="{{ .Release.Namespace }}",pod=~"{{ include "photo-server.fullname" . }}-.*",resource="memory",unit="byte"})
            )
          )
        threshold: "70"

