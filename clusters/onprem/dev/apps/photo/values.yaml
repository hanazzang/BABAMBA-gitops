# ===== 기본 스케일 =====
replicaCount: 1

# ===== 이미지 (환경별 핵심 값) =====
image:
  repository: ghcr.io/hanazzang/photo_service
  tag: "sha-29544c2"
  pullPolicy: IfNotPresent

# ===== 서비스 계정 =====
serviceAccount:
  name: photo-sa

# ===== 서비스 포트 =====
service:
  port: 5003
  targetPort: 5003

ingress:
  host: api.yongun.shop
# ===== 스토리지 (CephFS RWX) =====
# hostPath(RWO)에서 CephFS(RWX)로 전환하여 HPA 수평확장 시에도 마운트가 깨지지 않게 합니다.
# persistence:
#   enabled: true
#   type: pvc
#   storageClass: cephfs-rwx
#   accessMode: ReadWriteMany
#   size: 5Gi
#   mountPath: /app/static/uploads
persistence:
  enabled: true
  type: hostPath
  hostPath: /mnt/data/photos
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /app/static/uploads

# ===== 환경변수 주입 (사전 생성된 리소스) =====
#envFrom:
#  configMapRef:
#    name: db-config
#  secretRef:
#    name: db-credentials

# ===== 리소스 (dev 기준) =====
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

# ===== HPA =====
autoscaling:
  minReplicas: 1
  maxReplicas: 3
  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70