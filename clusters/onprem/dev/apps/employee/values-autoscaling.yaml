# 시나리오 스위치
# - 0: autoscaling.enabled=false, keda.enabled=false
# - 1: autoscaling.enabled=true,  keda.enabled=false
# - 2: autoscaling.enabled=true,  keda.enabled=true  (RPS/p95)

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  # 데모/발표용: 폭주 방지 상한선
  maxReplicas: 100
  cpu:
    averageUtilization: 85
  memory:
    averageUtilization: 70

monitoring:
  podMonitor:
    enabled: true
    path: /metrics
    interval: 10s
    scrapeTimeout: 10s

keda:
  enabled: true
  pollingInterval: 5
  cooldownPeriod: 60

  # 🔥 체감 속도 핵심
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 200        # 한 번에 2배
              periodSeconds: 15
            - type: Pods
              value: 4          # 15초에 최대 +4
              periodSeconds: 15
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
          selectPolicy: Min

  triggers:
    # 1️⃣ RPS (빠른 반응 트리거)
    - type: prometheus
      # 중요: query가 "전체 RPS(sum)"이므로 Value로 두어야 폭주(곱셈) 스케일이 안 납니다.
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: employee_rps
        query: >
          sum(
            rate(http_requests_total{
              namespace="{{ .Release.Namespace }}",
              app="{{ include "employee-server.name" . }}",
              status=~"2..",
              path!~"/(metrics|health|ready)"
            }[30s])
          )
        threshold: "20"

    # 2️⃣ p95 latency (안정성 트리거, 조건부)
    - type: prometheus
      # p95도 "전체 1개 값"이라 Value가 자연스럽습니다.
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: employee_p95_latency_seconds
        query: >
          histogram_quantile(
            0.95,
            sum(
              rate(http_request_duration_seconds_bucket{
                namespace="{{ .Release.Namespace }}",
                app="{{ include "employee-server.name" . }}",
                path!~"/(metrics|health|ready)"
              }[2m])
            ) by (le)
          )
          and
          sum(
            rate(http_requests_total{
              namespace="{{ .Release.Namespace }}",
              app="{{ include "employee-server.name" . }}",
              status=~"2..",
              path!~"/(metrics|health|ready)"
            }[2m])
          ) > 10
        threshold: "0.5"

    # 3️⃣ CPU (보조, 참고용)
    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: employee_cpu_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (
                rate(container_cpu_usage_seconds_total{
                  namespace="{{ .Release.Namespace }}",
                  pod=~"{{ include "employee-server.fullname" . }}-.*",
                  container!="POD"
                }[2m])
              )
              /
              sum by (pod) (
                kube_pod_container_resource_requests{
                  namespace="{{ .Release.Namespace }}",
                  pod=~"{{ include "employee-server.fullname" . }}-.*",
                  resource="cpu",
                  unit="core"
                }
              )
            )
          )
        threshold: "85"

    # 4️⃣ Memory (보조)
    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: employee_mem_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (
                container_memory_working_set_bytes{
                  namespace="{{ .Release.Namespace }}",
                  pod=~"{{ include "employee-server.fullname" . }}-.*",
                  container!="POD"
                }
              )
              /
              sum by (pod) (
                kube_pod_container_resource_requests{
                  namespace="{{ .Release.Namespace }}",
                  pod=~"{{ include "employee-server.fullname" . }}-.*",
                  resource="memory",
                  unit="byte"
                }
              )
            )
          )
        threshold: "70"
