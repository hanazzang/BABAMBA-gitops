# 시나리오 스위치
# - 0: autoscaling.enabled=false, keda.enabled=false
# - 1: autoscaling.enabled=true,  keda.enabled=false
# - 2: autoscaling.enabled=true,  keda.enabled=true  (RPS/p95)

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 100
  cpu:
    averageUtilization: 85
  memory:
    averageUtilization: 70

monitoring:
  podMonitor:
    enabled: true
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

keda:
  enabled: true
  pollingInterval: 15
  cooldownPeriod: 60

  triggers:
    # 1️⃣ RPS (유령 트래픽 제거)
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: employee_rps
        query: >
          sum(
            rate(http_requests_total{
              namespace="{{ .Release.Namespace }}",
              app="{{ include "employee-server.name" . }}",
              status=~"2..",
              path!~"/(metrics|health|ready)"
            }[2m])
          )
        threshold: "60"

    # 2️⃣ p95 latency (요청 있을 때만 의미 있게)
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: employee_p95_latency_seconds
        query: >
          histogram_quantile(
            0.95,
            sum(
              rate(http_request_duration_seconds_bucket{
                namespace="{{ .Release.Namespace }}",
                app="{{ include "employee-server.name" . }}",
                path!~"/(metrics|health|ready)"
              }[2m])
            ) by (le)
          )
          and
          sum(
            rate(http_requests_total{
              namespace="{{ .Release.Namespace }}",
              app="{{ include "employee-server.name" . }}",
              status=~"2..",
              path!~"/(metrics|health|ready)"
            }[2m])
          ) > 5
        threshold: "0.5"

    # 3️⃣ CPU (보조 트리거)
    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: employee_cpu_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (
                rate(container_cpu_usage_seconds_total{
                  namespace="{{ .Release.Namespace }}",
                  pod=~"{{ include "employee-server.fullname" . }}-.*",
                  container!="POD"
                }[2m])
              )
              /
              sum by (pod) (
                kube_pod_container_resource_requests{
                  namespace="{{ .Release.Namespace }}",
                  pod=~"{{ include "employee-server.fullname" . }}-.*",
                  resource="cpu",
                  unit="core"
                }
              )
            )
          )
        threshold: "85"

    # 4️⃣ Memory (보조 트리거)
    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: employee_mem_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (
                container_memory_working_set_bytes{
                  namespace="{{ .Release.Namespace }}",
                  pod=~"{{ include "employee-server.fullname" . }}-.*",
                  container!="POD"
                }
              )
              /
              sum by (pod) (
                kube_pod_container_resource_requests{
                  namespace="{{ .Release.Namespace }}",
                  pod=~"{{ include "employee-server.fullname" . }}-.*",
                  resource="memory",
                  unit="byte"
                }
              )
            )
          )
        threshold: "70"
