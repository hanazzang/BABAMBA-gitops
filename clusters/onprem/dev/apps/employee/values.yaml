imagePullSecrets:
  - name: ghcr-pull

# ===== 이미지 (환경별 핵심 값) =====
image:
  repository: ghcr.io/hanazzang/employee_server
  tag: "sha-29544c2"
  pullPolicy: IfNotPresent

envFrom:
  - configMapRef:
      name: db-config
  - configMapRef:
      name: redis-config
  - secretRef:
      name: db-credentials

# ===== HPA (dev 테스트용) =====
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70
