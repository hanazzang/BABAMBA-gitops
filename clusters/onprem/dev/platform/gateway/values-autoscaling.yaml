# 시나리오 스위치
# - 0: autoscaling.enabled=false, keda.enabled=false (고정 replicas)
# - 1: autoscaling.enabled=true,  keda.enabled=false (HPA: CPU/MEM, metrics-server)
# - 2: autoscaling.enabled=true,  keda.enabled=true  (RPS/p95 + CPU% + MEM%)



autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 13
  cpu:
    averageUtilization: 85
  memory:
    averageUtilization: 70
    
monitoring:
  podMonitor:
    # Envoy(/stats/prometheus) 지표 수집이 켜져 있어야
    # - Grafana Envoy 대시보드
    # - KEDA Prometheus(RPS) 트리거
    # 가 정상 동작합니다.
    enabled: true

keda:
  # ✅ 기본은 HPA(metrics-server)로 스케일
  # - 부하테스트 후 KEDA로 전환이 필요하면 enabled만 true로 바꾸면 됩니다.
  enabled: false
  pollingInterval: 15
  cooldownPeriod: 300
  triggers:
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: gateway_rps
        # total RPS(sum) / threshold => replicas(대략) 로 스케일되는 형태
        query: 'sum(rate(envoy_http_downstream_rq_total{namespace="{{ .Values.envoyProxy.namespace }}",app="{{ .Values.envoyProxy.podLabels.app }}"}[1m]))'
        threshold: "200"

    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: gateway_cpu_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (rate(container_cpu_usage_seconds_total{namespace="{{ .Values.envoyProxy.namespace }}",pod=~"{{ (.Values.envoyProxy.deploymentName | default .Values.envoyProxy.name) }}-.*",container!="POD"}[2m]))
              /
              sum by (pod) (kube_pod_container_resource_requests{namespace="{{ .Values.envoyProxy.namespace }}",pod=~"{{ (.Values.envoyProxy.deploymentName | default .Values.envoyProxy.name) }}-.*",resource="cpu",unit="core"})
            )
          )
        threshold: "85"

    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: gateway_mem_util_percent
        query: >
          avg(
            100 *
            (
              sum by (pod) (container_memory_working_set_bytes{namespace="{{ .Values.envoyProxy.namespace }}",pod=~"{{ (.Values.envoyProxy.deploymentName | default .Values.envoyProxy.name) }}-.*",container!="POD"})
              /
              sum by (pod) (kube_pod_container_resource_requests{namespace="{{ .Values.envoyProxy.namespace }}",pod=~"{{ (.Values.envoyProxy.deploymentName | default .Values.envoyProxy.name) }}-.*",resource="memory",unit="byte"})
            )
          )
        threshold: "70"

