# 시나리오 스위치
# - 0: autoscaling.enabled=false, keda.enabled=false (고정 replicas)
# - 1: autoscaling.enabled=true,  keda.enabled=false (HPA: CPU/MEM, metrics-server)
# - 2: autoscaling.enabled=true,  keda.enabled=true  (RPS/p95 + CPU% + MEM%)

envoyProxy:
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      # 부하 시 throttling/OOM 여유를 위해 기본값(500m/512Mi)보다 상향
      cpu: "1000m"
      memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 13
  cpu:
    averageUtilization: 70
  memory:
    averageUtilization: 70
  # 실무 포인트: 스케일링 정책(플랩핑 방지)
  # - scaleUp: 빠르게 확장 (게이트웨이 큐잉/타임아웃이 쌓이기 전 확장)
  # - scaleDown: 천천히 축소 (트래픽 출렁임/배포 중 흔들림 완화)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 120 # 테스트를 위해 낮게잡음. 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
     
monitoring:
  # NOTE: Prometheus가 ServiceMonitor/PodMonitor selector를 라벨로 제한하는 환경이라면
  # 아래 release 라벨을 Prometheus release 값으로 맞춰야 합니다.
  # (onprem/dev monitoring values는 selector가 {}로 열려 있어 보통 비워도 됩니다.)
  prometheusReleaseLabel: ""
  podMonitor:
    # Envoy(/stats/prometheus) 지표 수집이 켜져 있어야
    # - Grafana Envoy 대시보드
    # - KEDA Prometheus(RPS) 트리거
    # 가 정상 동작합니다.
    enabled: true
    path: /stats/prometheus
    interval: 15s
    scrapeTimeout: 10s
    targetPort: 19000

keda:
  # ✅ 기본은 HPA(metrics-server)로 스케일
  # - 부하테스트 후 KEDA로 전환이 필요하면 enabled만 true로 바꾸면 됩니다.
  enabled: false
  # Prometheus 질의 주기(초). scrape interval(예: 15s/20s)보다 과하게 짧게 잡으면
  # 같은 샘플을 자주 재조회하게 되어 부하만 늘 수 있습니다.
  pollingInterval: 10
  cooldownPeriod: 120
  triggers:
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://kps-prometheus.monitoring.svc:9090
        metricName: gateway_rps
        # total RPS(sum) / threshold => replicas(대략) 로 스케일되는 형태
        # NOTE:
        # - Envoy 메트릭은 app 메트릭(http_requests_total)처럼 handler/path 라벨이 항상 있지 않아
        #   /health 같은 경로 제외 필터를 넣기 어려울 수 있습니다.
        # - 대신 응답코드 라벨(envoy_response_code)을 이용해 2xx만 카운팅하여
        #   에러 폭주로 인한 "헛스케일"을 줄입니다.
        query: >
          sum(
            rate(envoy_http_downstream_rq_total{
              namespace="{{ .Values.envoyProxy.namespace }}",
              app="{{ .Values.envoyProxy.podLabels.app }}",
              envoy_response_code=~"2.."
            }[30s])
          )
        # per-pod 목표 RPS. 낮을수록 더 빨리 늘고, 높을수록 보수적으로 늘어납니다.
        threshold: "200"

    - type: prometheus
      metricType: Value
      metadata:
        serverAddress: http://kps-prometheus.monitoring.svc:9090
        metricName: gateway_cpu_util_percent
        query: >
          100 *
          (
            sum(
              max by (pod, container) (
                rate(container_cpu_usage_seconds_total{
                  namespace="{{ .Values.envoyProxy.namespace }}",
                  pod=~"{{ (.Values.envoyProxy.deploymentName | default .Values.envoyProxy.name) }}-.*",
                  container="envoy"
                }[2m])
              )
            )
            /
            sum(
              kube_pod_container_resource_requests{
                namespace="{{ .Values.envoyProxy.namespace }}",
                pod=~"{{ (.Values.envoyProxy.deploymentName | default .Values.envoyProxy.name) }}-.*",
                container="envoy",
                resource="cpu",
                unit="core"
              }
            )
          )
        threshold: "85"



    # NOTE: 메모리는 한번 올라가면 천천히 내려가는 경향이 있어(플랩핑/과증설/원인분석 어려움) 기본 스케일 신호로는 보수적으로 제외합니다.
    # NOTE: 게이트웨이(Envoy)는 보통 RPS/CPU가 병목을 더 잘 대표하므로, KEDA에서는 RPS + CPU만으로 시작하고 필요 시 MEM을 추가합니다.
