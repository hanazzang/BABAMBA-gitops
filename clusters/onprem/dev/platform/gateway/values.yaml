gateway:
  namespace: gateway
  gatewayClassName: envoy
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway: user

    - name: https 
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway: user
      tls:
        mode: Terminate
        secretName: api-yong-tls   # ← gateway 네임스페이스에 이 Secret 있어야 함

envoyProxy:
  service:
    # MetalLB IPAddressPool(onprem-dev-pool)과 일치해야 주소가 할당됩니다.
    loadBalancerIP: 192.168.13.199

# Envoy dataplane metrics scrape (/stats/prometheus) + RPS 기반 autoscaling(KEDA)
monitoring:
  podMonitor:
    enabled: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8

keda:
  enabled: true
  pollingInterval: 15
  cooldownPeriod: 300
  triggers:
    # Gateway total RPS (Prometheus) -> threshold 기준으로 scale
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://onprem-dev-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: gateway_rps
        query: 'sum(rate(envoy_http_downstream_rq_total{namespace="{{ .Values.envoyProxy.namespace }}",app="{{ .Values.envoyProxy.podLabels.app }}"}[1m]))'
        threshold: "200"
