    replicas: 1
    resources:
      requests:
        cpu: "300m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

    # # 스토리지 쓰려면 아래 주석 해제
    # storageSpec:
    #   # 데모용 임시 디렉터리 
    #   emptyDir:
    #     medium: ""
    # 저장소 볼륨 설정
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-storage" # 로컬 디렉토리를 쓸 것이므로 비워둡니다.
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 70Gi

    # 모든 네임스페이스의 ServiceMonitor 자동 감지
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}

    # [Blackbox Probe] Probe CRD를 Prometheus가 수집하도록 설정(핵심)
    # Probe 리소스에 아래 라벨이 붙어 있어야 함:
    # labels:
    #   release: onprem-dev-kube-prometheus-stack
    probeSelector: {}
    # Probe가 위치한 네임스페이스 선택(기본: 전체 허용)
    probeNamespaceSelector: {}
  
  service:
    type: NodePort
    nodePort: 30090  # 이 포트로 접근 시도

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    # 노드 격리 설정 추가
    nodeSelector:
      dedicated: "monitoring"
    tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "monitoring"
      effect: "NoSchedule"
    alertmanagerConfigSelector:
      matchLabels:
        release: onprem-dev-kube-prometheus-stack

# 데모 환경에서 불필요한 고부하 수집기 비활성화
kubeProxy:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false

# kube-state-metrics / node-exporter 등은 기본 포함이지만 명시
# 노드 및 K8s 상태 지표 명시적 활성화
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true
