crds:
  enabled: false

grafana:
  enabled: true
  service:
    type: NodePort
    nodePort: 32300

  # 로그인 강제 + 계정 생성 금지
  grafana.ini:
    auth.anonymous:
      enabled: false
    users:
      allow_sign_up: false
      allow_org_create: false

  # admin 비번은 Secret에서만
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  # Grafana 대시보드와 사용자 설정 보존용 스토리지
  persistence:
    # 데모 버전 false설정, 실 테스트에선 true로 변경하고 아래 주석 풀기
    enabled: false
    # storageClassName: "ceph" # Ceph StorageClass
    # size: 10Gi



prometheus:
  prometheusSpec:
    retention: 7d
    replicas: 1
    resources:
      requests:
        cpu: "300m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    # 스토리지 쓰려면 아래 주석 해제
    storageSpec:
      # 데모용 임시 디렉터리 
      emptyDir:
        medium: ""
      # ceph 스토리지
      # volumeClaimTemplate:
      #   spec:
      #     storageClassName: "ceph"   # Ceph StorageClass
      #     accessModes: ["ReadWriteOnce"]
      #     resources:
      #       requests:
      #         storage: 30Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    alertmanagerConfigSelector:
      matchLabels:
        release: onprem-dev-kube-prometheus-stack

# kube-state-metrics / node-exporter 등은 기본 포함