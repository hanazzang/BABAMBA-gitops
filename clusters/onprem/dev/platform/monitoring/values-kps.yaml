crds:
  enabled: false

grafana:
  enabled: true
  service:
    type: NodePort
    nodePort: 32300
  # 사이드카 설정(커스텀한 대시보드 사용)
  sidecar:
    dashboards:
      enabled: true
      # 라벨 키(해당 라벨이 있는 configmap 스캔)
      label: grafana_dashboard

      # ConfigMap에 grafana_dashboard: "1" 로 붙일 거라면 값도 맞춰주는 게 안전
      labelValue: "1"

      # (권장) RBAC 꼬임 방지: Grafana가 있는 네임스페이스만 스캔
      # 보통 kube-prometheus-stack grafana도 monitoring에 있으니 monitoring 추천
      searchNamespace: monitoring

      # (권장) 폴더 분리하고 싶으면 ConfigMap에 이 annotation 달면 폴더가 나뉨
      folderAnnotation: grafana_folder

      # (권장) Grafana provisioning provider 설정
      provider:
        allowUiUpdates: false
        foldersFromFilesStructure: true

  # 사이드카 설정(커스텀한 대시보드 사용)
  sidecar:
    dashboards:
      enabled: true
      # 라벨 키
      label: grafana_dashboard

      # (중요) ConfigMap에 grafana_dashboard: "1" 로 붙일 거라면 값도 맞춰주는 게 안전
      labelValue: "1"

      # (권장) RBAC 꼬임 방지: Grafana가 있는 네임스페이스만 스캔
      # 보통 kube-prometheus-stack grafana도 monitoring에 있으니 monitoring 추천
      searchNamespace: monitoring

      # (권장) 폴더 분리하고 싶으면 ConfigMap에 이 annotation 달면 폴더가 나뉨
      folderAnnotation: grafana_folder

      # (권장) Grafana provisioning provider 설정
      provider:
        allowUiUpdates: false
        foldersFromFilesStructure: true


  # 로그인 강제 + 계정 생성 금지
  grafana.ini:
    auth.anonymous:
      enabled: false
    users:
      allow_sign_up: false
      allow_org_create: false

  # admin 비번은 Secret에서만
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  # Grafana 대시보드와 사용자 설정 보존용 스토리지
  persistence:
    # 데모 버전 false설정, 실 테스트에선 true로 변경하고 아래 주석 풀기
    enabled: false
    # storageClassName: "ceph" # Ceph StorageClass
    # size: 10Gi

  # loki
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://onprem-dev-loki-loki.loki.svc.cluster.local:3100
      isDefault: false
      
prometheus-node-exporter:
  tolerations:
    # 모든 Taint를 무시하고 모든 노드에 설치되도록 설정
    - operator: "Exists"

# operator도 격리
prometheusOperator:
  nodeSelector:
    dedicated: "monitoring"
  tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "monitoring"
    effect: "NoSchedule"

prometheus:
  prometheusSpec:
