grafana:
  enabled: true
  service:
    type: NodePort
    nodePort: 32300
  adminPassword: "admin"   # 운영에선 Secret

prometheus:
  prometheusSpec:
    retention: 7d
    replicas: 1
    resources:
      requests:
        cpu: "300m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    # 스토리지 쓰려면 아래 주석 해제 + storageClassName만 환경에 맞게 수정
    # storageSpec:
    #   volumeClaimTemplate:
    #     spec:
    #       storageClassName: "nfs-client"   # <-- 네 storageClass로 변경
    #       accessModes: ["ReadWriteOnce"]
    #       resources:
    #         requests:
    #           storage: 30Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1

# kube-state-metrics / node-exporter 등은 기본 포함(보통 그대로 OK)