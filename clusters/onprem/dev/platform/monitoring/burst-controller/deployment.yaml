apiVersion: apps/v1
kind: Deployment
metadata:
  name: burst-controller
  namespace: monitoring
  labels:
    app.kubernetes.io/name: burst-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: burst-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: burst-controller
    spec:
      containers:
        - name: echo
          image: mendhak/http-https-echo:31
          ports:
            - name: http
              containerPort: 80
          env:
            - name: HTTP_PORT
              value: "80"
