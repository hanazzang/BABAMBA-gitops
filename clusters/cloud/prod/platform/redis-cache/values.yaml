replicaCount: 1
namespace: common

image:
  repository: redis
  tag: "7.2"
  pullPolicy: IfNotPresent

service:
  name: redis-cache-service
  port: 6379

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

redis:
  maxmemory: "768mb"
  maxmemoryPolicy: "allkeys-lru"
