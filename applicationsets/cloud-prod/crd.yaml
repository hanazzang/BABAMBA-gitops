apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cloud-prod-platform-crds
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/hanazzang/BABAMBA-gitops
        revision: refactor/gitops-structure
        directories:
          - path: clusters/cloud/prod/crds/*

  template:
    metadata:
      name: 'cloud-prod-crds-{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default

      sources:
        - repoURL: https://github.com/hanazzang/BABAMBA-gitops
          targetRevision: refactor/gitops-structure
          path: platform/{{path.basename}}
          helm:
            valueFiles:
              # (선택) 공통값도 같이 쓰고 싶다면 platform 쪽 values 유지
              - $values/platform/crds/{{path.basename}}/values.yaml
              # 환경별 CRD values (clusters/.../crds/<name>/values.yaml)
              - $values/{{path}}/values.yaml

        - repoURL: https://github.com/hanazzang/BABAMBA-gitops
          targetRevision: refactor/gitops-structure
          ref: values
          path: .

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'

      ignoreDifferences:
        - group: monitoring.coreos.com
          kind: PodMonitor
          jqPathExpressions:
            - .spec.podMetricsEndpoints[]?.relabelings
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: argoproj.io
          kind: Rollout
          jsonPointers:
            - /spec/replicas

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
