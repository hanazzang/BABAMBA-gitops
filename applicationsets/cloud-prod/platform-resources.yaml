apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-resources
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/hanazzang/BABAMBA-gitops
        revision: hana
        directories:
          - path: clusters/cloud/prod/platform/*
  template:
    metadata:
      name: 'cloud-prod-{{path.basename}}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/hanazzang/BABAMBA-gitops
          targetRevision: hana
          path: platform/{{path.basename}}
          helm:
            valueFiles:
              - $values/platform/{{path.basename}}/values.yaml
              - $values/{{path}}/values.yaml
        - repoURL: https://github.com/hanazzang/BABAMBA-gitops
          targetRevision: hana
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
