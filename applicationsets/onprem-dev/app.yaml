apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: onprem-dev-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/hanazzang/BABAMBA-gitops
        revision: refactor/gitops-structure
        directories:
          - path: clusters/onprem/dev/apps/*
  template:
    metadata:
      name: 'onprem-dev-{{path.basename}}'
    spec:
      project: default

      sources:
        - repoURL: https://github.com/hanazzang/BABAMBA-gitops
          targetRevision: refactor/gitops-structure
          path: charts/{{path.basename}}
          helm:
            valueFiles:
              - $values/{{path}}/values.yaml
              - $values/{{path}}/values-autoscaling.yaml 

        - repoURL: https://github.com/hanazzang/BABAMBA-gitops
          targetRevision: refactor/gitops-structure
          ref: values

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      
      ignoreDifferences:   
        - group: monitoring.coreos.com
          kind: PodMonitor
          jqPathExpressions:
            - .spec.podMetricsEndpoints[]?.relabelings
        - group: argoproj.io
          kind: Rollout
          jsonPointers:
            - /spec/replicas
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        # 데모/임시 우회용: auth 네임스페이스의 redis-config는 운영 중 수동 패치가 있을 수 있어
        # 특정 키는 ArgoCD selfHeal 대상에서 제외(되돌림 방지)
        - group: ""
          kind: ConfigMap
          name: redis-config
          namespace: auth
          jsonPointers:
            - /data/REDIS_SENTINEL_HOST
            - /data/REDIS_SENTINEL_PORT
            - /data/REDIS_CACHE_HOST
            - /data/REDIS_CACHE_PORT
            - /data/REDIS_MASTER_NAME
            - /data/REDIS_PASSWORD
        # 데모/임시 우회용: employee 네임스페이스의 redis-config도 운영 중 수동 패치가 있을 수 있어
        - group: ""
          kind: ConfigMap
          name: redis-config
          namespace: employee
          jsonPointers:
            - /data/REDIS_SENTINEL_HOST
            - /data/REDIS_SENTINEL_PORT
            - /data/REDIS_CACHE_HOST
            - /data/REDIS_CACHE_PORT
            - /data/REDIS_MASTER_NAME
            - /data/REDIS_PASSWORD

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true