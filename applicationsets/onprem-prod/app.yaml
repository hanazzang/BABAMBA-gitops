apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: onprem-prod-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/hanazzang/BABAMBA-gitops
        revision: refactor/gitops-structure
        directories:
          - path: clusters/onprem/prod/apps/*
  template:
    metadata:
      name: 'onprem-prod-{{path.basename}}'
    spec:
      project: default

      sources:
        - repoURL: https://github.com/hanazzang/BABAMBA-gitops
          targetRevision: refactor/gitops-structure
          path: charts/{{path.basename}}
          helm:
            valueFiles:
              # (선택) 공통값(앱별 기본 values)을 repo에 두는 구조라면 유지
              - $values/charts/{{path.basename}}/values.yaml
              # 환경별 오버레이
              - $values/{{path}}/values.yaml

        - repoURL: https://github.com/hanazzang/BABAMBA-gitops
          targetRevision: refactor/gitops-structure
          ref: values
          path: .

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'

      ignoreDifferences:
        - group: monitoring.coreos.com
          kind: PodMonitor
          jqPathExpressions:
            - .spec.podMetricsEndpoints[]?.relabelings
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: argoproj.io
          kind: Rollout
          jsonPointers:
            - /spec/replicas

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
