apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: onprem-prod-platform-crds # ✅ 이름 변경
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/hanazzang/BABAMBA-gitops
        revision: refactor/gitops-structure
        directories:
          - path: clusters/onprem/crds/* # ✅ On-prem 감시 경로로 변경
  template:
    metadata:
      name: 'onprem-prod-crds-{{path.basename}}' # ✅ 앱 이름 접두어 변경
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      source:
        repoURL: https://github.com/hanazzang/BABAMBA-gitops
        targetRevision: refactor/gitops-structure
        # 실제 YAML 파일 위치는 platform/crds 하위를 그대로 사용한다고 가정 (구조 동일 시)
        path: platform/crds/{{path.basename}} 
        directory:
          recurse: true 
      destination:
        # ⚠️ 만약 On-prem 클러스터가 별도라면 해당 서버 주소로 변경 필요
        server: https://kubernetes.default.svc 
      
      # (기존 ignoreDifferences 및 syncPolicy 설정 유지)
      ignoreDifferences:
        - group: monitoring.coreos.com
          kind: PodMonitor
          jqPathExpressions:
            - .spec.podMetricsEndpoints[]?.relabelings
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: argoproj.io
          kind: Rollout
          jsonPointers:
            - /spec/replicas

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true