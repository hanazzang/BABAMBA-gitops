apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-infrastructure
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list: # [1] 클러스터 목록 (고정)
              elements:
              - cluster: onprem-dev
                url: https://kubernetes.default.svc
                base_path: clusters/onprem/dev/platform
              - cluster: onprem-prod
                url: https://kubernetes.default.svc
                base_path: clusters/onprem/prod/platform
              - cluster: cloud-prod
                url: https://kubernetes.default.svc
                base_path: clusters/cloud/prod/platform
          - git: # [2] 해당 클러스터의 platform 폴더 내부만 스캔
              repoURL: https://github.com/yoooooungwoon/gitops
              revision: HEAD
              directories:
                # {{base_path}} 변수를 사용하여 다른 클러스터나 apps 폴더 침범 차단
                - path: '{{base_path}}/*' 
  template:
    metadata:
      name: '{{cluster}}-{{path.basename}}'
    spec:
      project: default
      # 1️⃣ 단일 source 대신 sources(복수형)를 사용합니다.
      sources:
        # [A] 헬름 차트 엔진 (Stage 3 폴더 가리키기)
        - repoURL: https://github.com/yoooooungwoon/gitops
          targetRevision: HEAD
          path: 'charts/{{path.basename}}' 
          helm:
            # 💡 핵심: $values-repo라는 별칭을 앞에 붙여서 헬름의 경로 제약을 뚫습니다.
            valueFiles:
              - '$values-repo/platform/{{path.basename}}/values.yaml' # Stage 2: 공통 설정
              - '$values-repo/{{path}}/values.yaml'                  # Stage 4: 개별 설정
        
        # [B] 설정 데이터 참조용 가상 소스 (리포지토리 루트 가리키기)
        - repoURL: https://github.com/yoooooungwoon/gitops
          targetRevision: HEAD
          ref: values-repo # 👈 위에서 사용할 별칭 이름
          
      destination:
        server: '{{url}}'
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true