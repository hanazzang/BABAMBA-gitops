apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: gmail
  namespace: monitoring
  labels:
    release: onprem-dev-kube-prometheus-stack
spec:
  route:
    receiver: gmail
    # 알림 그룹화에 cluster 라벨 추가 (어느 환경인지 명확히 분리)
    groupBy: ["alertname", "cluster", "pod"]
    groupWait: 10s
    groupInterval: 3m
    repeatInterval: 2h
    routes:
      - receiver: gmail
        matchers:
          - name: severity
            value: warning
            matchType: "="
        continue: true

  receivers:
      - name: gmail
        emailConfigs:
          - to: "sieun6213@naver.com"
            from: "sieun6213@gmail.com"
            smarthost: "smtp.gmail.com:587"
            authUsername: "sieun6213@gmail.com"
            authPassword:
              name: alertmanager-gmail
              key: smtp_pass
            # [수정] 맵 방식에서 리스트 방식으로 변경
            headers:
              - name: "Subject"
                value: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }} ({{ .Values.global.clusterName }} / {{ .CommonLabels.pod }})'
            requireTLS: true