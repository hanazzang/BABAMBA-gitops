apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee-server
  template:
    metadata:
      labels:
        app: employee-server
    spec:
      serviceAccountName: employee-sa
      containers:
      - name: employee-server
        image: ghcr.io/hanazzang/employee_server:sha-758193e
        ports:
        - containerPort: 5002
        envFrom:
        - configMapRef:
            name: db-config
        - secretRef:
            name: db-credentials
        resources:
          limits:
            memory: "512Mi"
            cpu: "200m"
          requests:
            memory: "128Mi"
            cpu: "100m"