apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.persistence.storageClass }}
provisioner: rbd.csi.ceph.com
parameters:
  clusterID: {{ .Values.ceph.clusterId | quote }}
  pool: {{ .Values.ceph.poolName | quote }} # 여기에 Pool 정보가 들어감
  imageFormat: "2"
  imageFeatures: layering
  # 위에서 생성한 Secret 참조
  csi.storage.k8s.io/provisioner-secret-name: {{ include "my-chart.fullname" . }}-ceph-secret
  csi.storage.k8s.io/provisioner-secret-namespace: {{ .Release.Namespace }}
  csi.storage.k8s.io/node-stage-secret-name: {{ include "my-chart.fullname" . }}-ceph-secret
  csi.storage.k8s.io/node-stage-secret-namespace: {{ .Release.Namespace }}
reclaimPolicy: {{ .Values.persistence.reclaimPolicy | default "Delete" }}
allowVolumeExpansion: true