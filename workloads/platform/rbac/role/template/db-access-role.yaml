# DB 정보를 읽을 수 있는 '역할' 정의 (Role)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: db-access-role
rules:
- apiGroups: [""] # Core API 그룹
  resources: ["secrets", "configmaps"]
  resourceNames: ["db-credentials", "db-config"] # 딱 이 이름의 자원만 허용
  verbs: ["get", "list", "watch"]