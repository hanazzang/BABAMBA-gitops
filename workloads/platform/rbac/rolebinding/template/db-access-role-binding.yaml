# 2. Auth 서버에 DB 권한 부여 (RoleBinding)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-db-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: auth-sa # 1단계에서 만든 이름
  namespace: default
roleRef:
  kind: Role
  name: db-access-role
  apiGroup: rbac.authorization.k8s.io
---
# 3. Employee 서버에 DB 권한 부여 (RoleBinding)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: employee-db-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: employee-sa # 1단계에서 만든 이름
  namespace: default
roleRef:
  kind: Role
  name: db-access-role
  apiGroup: rbac.authorization.k8s.io