replicaCount: 1
image:
  repository: ghcr.io/hanazzang/auth_server
  tag: "sha-17ad308"
  pullPolicy: IfNotPresent


imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: auth-sa

service:
  port: 5001
  targetPort: 5001

envFrom:
  - configMapRef:
      name: db-config
  - configMapRef:
      name: redis-config
  - secretRef:
      name: db-credentials
