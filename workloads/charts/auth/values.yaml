#         - REDIS_CACHE_HOST
#         - REDIS_CACHE_PORT

resources:
  limits:
    memory: "512Mi"
    cpu: "200m"
  requests:
    memory: "128Mi"
    cpu: "100m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  cpu:
    averageUtilization: 50
  memory:
    averageUtilization: 70
