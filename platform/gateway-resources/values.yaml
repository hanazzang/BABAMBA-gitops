gateway:
  name: service-gateway
  namespace: gateway
  gatewayClassName: envoy

  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway: user

envoyProxy:
  name: envoy-gw-infra
  namespace: envoy-gateway-system

  replicas: 2

  service:
    type: ClusterIP

  podLabels:
    app: envoy-gw-dataplane