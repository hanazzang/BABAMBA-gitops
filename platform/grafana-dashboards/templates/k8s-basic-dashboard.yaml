apiVersion: v1
kind: ConfigMap
metadata:
  # 1. 이름 충돌 방지
  name: grafana-dashboard-k8s-basics
  namespace: monitoring
  labels:
    # 2. 그라파나 자동 인식 라벨
    grafana_dashboard: "1"
  annotations:
    # 3. 폴더 지정
    grafana_folder: "loadtest"
data:
  k8s-basics.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 99,
          "title": "🧠 컨트롤 타워 및 클러스터 현황 (Cluster Health KPI)",
          "type": "row",
          "collapsed": false
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value"
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\", status=\"true\"})",
              "legendFormat": "Ready Nodes",
              "refId": "A"
            }
          ],
          "title": "생존 노드 수",
          "type": "stat",
          "description": "Ready 상태인 노드 개수"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "s",
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  { "color": "green", "value": 100 },
                  { "color": "red", "value": 0 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 5, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "reduceOptions": { "calcs": ["mean"], "fields": "", "values": false },
            "colorMode": "value"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{verb!~\"WATCH|CONNECT\"}[5m])) by (le))",
              "legendFormat": "Latency",
              "refId": "A"
            }
          ],
          "title": "API 서버 응답속도 (P99)",
          "type": "stat",
          "description": "K8s 명령 처리 속도. 1초 넘으면 느림."
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 5, "x": 9, "y": 1 },
          "id": 3,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value"
          },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running Pods",
              "refId": "A"
            }
          ],
          "title": "실행 중인 파드 수",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 5, "x": 14, "y": 1 },
          "id": 4,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "background"
          },
          "targets": [
            {
              "expr": "count(kube_persistentvolumeclaim_status_phase{phase!=\"Bound\"}) OR vector(0)",
              "legendFormat": "Unbound PVCs",
              "refId": "A"
            }
          ],
          "title": "연결 실패한 PVC (Error)",
          "type": "stat",
          "description": "0이어야 정상. 1 이상이면 스토리지 연결 끊김."
        },
         {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 5, "x": 19, "y": 1 },
          "id": 10,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "background"
          },
          "targets": [
            {
              "expr": "etcd_server_has_leader",
              "legendFormat": "Etcd Leader",
              "refId": "A"
            }
          ],
          "title": "Etcd 상태 (Brain Health)",
          "type": "stat",
          "description": "1이면 정상(리더 있음), 0이면 뇌사 상태."
        },
        {
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 98,
          "title": "🏗️ 노드 자원 상태 (Node Infrastructure)",
          "type": "row",
          "collapsed": false
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 5,
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "showLegend": true }
          },
          "targets": [
            {
              "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[2m])) by (instance)) * 100",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "노드별 CPU 사용률",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 6,
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "showLegend": true }
          },
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "노드별 메모리 사용률",
          "type": "timeseries"
        },
        {
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 97,
          "title": "🚨 워크로드 안정성 (App Stability - SLI)",
          "type": "row",
          "collapsed": false
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 100,
                "lineWidth": 1
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 7,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
             "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total[1h])) by (pod) > 0",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "🔥 파드 재시작 횟수 (Restarts)",
          "type": "timeseries",
          "description": "★핵심: 그래프가 튀면 앱이 죽었다 살아난 것. 즉시 로그 확인 필요."
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 8,
          "options": {
            "orientation": "horizontal",
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_terminated_reason{reason=\"OOMKilled\"}) by (pod) > 0",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "💀 OOM Killed (메모리 초과 사망)",
          "type": "bargauge",
          "description": "메모리 부족으로 강제 종료된 파드 목록"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["kubernetes", "k8s", "basic", "sli"],
      "templating": {
        "list": []
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "K8s 기초 필수 모니터링 (Basic)",
      "uid": "k8s-basic-v1",
      "version": 1,
      "weekStart": ""
    }