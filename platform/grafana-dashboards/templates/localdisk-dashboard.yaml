apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-localdisk
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "loadtest"
data:
  localdisk-dashboard.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 99,
          "title": "🚦 현재 상태 요약 (Real-time Snapshot)",
          "type": "row",
          "collapsed": false
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "#EAB839", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 1 },
          "id": 3,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "avg(rate(node_cpu_seconds_total{mode=\"iowait\"}[1m])) by (instance) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$nodename\"} * 100",
              "legendFormat": "{{nodename}} I/O Wait",
              "refId": "A"
            }
          ],
          "title": "CPU I/O Wait (병목)",
          "type": "gauge",
          "description": "서버별 I/O Wait. 10% 초과 시 병목."
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "#EAB839", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "max(rate(node_disk_io_time_seconds_total{device!~\"loop.*|ram.*\"}[1m])) by (instance, device) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$nodename\"} * 100",
              "legendFormat": "{{nodename}} ({{device}})",
              "refId": "A"
            }
          ],
          "title": "디스크 포화도 (Disk Saturation)",
          "type": "gauge",
          "description": "서버별 가장 바쁜 디스크 부하량."
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "#EAB839", "value": 80 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 1 },
          "id": 1,
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true,
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": false }
          },
          "targets": [
            {
              "expr": "(100 - ((node_filesystem_avail_bytes{fstype!~\"tmpfs|fuse.*\"} * 100) / node_filesystem_size_bytes)) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$nodename\"}",
              "legendFormat": "{{nodename}} ({{mountpoint}})",
              "refId": "A"
            }
          ],
          "title": "서버별 디스크 사용률",
          "type": "bargauge",
          "description": "서버명과 마운트 포인트 표시"
        },
        {
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 98,
          "title": "📈 성능 변화 추이 (History Trend)",
          "type": "row",
          "collapsed": false
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "spanNulls": false
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 4,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "rate(node_cpu_seconds_total{mode=\"iowait\"}[1m]) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$nodename\"} * 100",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            }
          ],
          "title": "I/O Wait 추이 (서버명)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "spanNulls": false
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 5,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "max(rate(node_disk_io_time_seconds_total{device!~\"loop.*|ram.*\"}[1m])) by (instance, device) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$nodename\"} * 100",
              "legendFormat": "{{nodename}} ({{device}})",
              "refId": "A"
            }
          ],
          "title": "디스크 부하량 추이 (서버명)",
          "type": "timeseries"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["local-disk", "performance", "hostname"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(node_uname_info, nodename)",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "nodename",
            "options": [],
            "query": "label_values(node_uname_info, nodename)",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query",
            "label": "Server Name"
          }
        ]
      },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "로컬 디스크 성능 대시보드 (Server Name)",
      "uid": "local-disk-v4",
      "version": 1,
      "weekStart": ""
    }