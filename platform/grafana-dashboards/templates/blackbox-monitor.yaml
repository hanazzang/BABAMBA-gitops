apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: blackbox-exporter-monitor
  namespace: monitoring
  labels:
    release: onprem-dev-kube-prometheus-stack
spec:
  selector:
    matchLabels:
    # 차트가 생성한 서비스 라벨과 일치해야 함
      app.kubernetes.io/name: prometheus-blackbox-exporter
  endpoints:
    - port: http-metrics  # 포트 이름을 명시합니다.
      # 이름 대신 실제 포트 번호(9115)를 명시하여 연결을 강제합니다.
      # targetPort: 9115
      interval: 30s
      path: /metrics