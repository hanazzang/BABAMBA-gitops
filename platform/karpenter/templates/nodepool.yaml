apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: {{ toYaml .Values.nodePool.capacityType | nindent 10 }}

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
