apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: gateway-only
  namespace: k6
spec:
  parallelism: 10
  cleanup: post

  script:
    configMap:
      name: k6-hpa-test-scenario
      file: k6-hpa-employee-multiid.js

  runner:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

  arguments: >
    -e TEST_MODE=gateway_only
    -e USERS=1000
    -e DURATION=2m
    -e TIMEOUT=10s
    -e GETS_PER_SEC=100   # 초당 2회 GET 요청
    -e HOST_HEADER=api.yongun.shop
    # gateway-only는 "게이트웨이 레이어 병목"을 보기 위해
    # 가능한 한 가벼운 엔드포인트(백엔드 business 로직 최소)를 권장합니다.
    # platform/gateway 차트가 제공하는 http-echo: /gateway-health
    -e GATEWAY_URL=http://service-gateway.gateway.svc.cluster.local/gateway-health
    -e GATEWAY_NEEDS_AUTH=false
