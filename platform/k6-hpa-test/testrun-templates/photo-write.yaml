apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: photo-write
  namespace: k6
spec:
  parallelism: 10
  cleanup: post

  script:
    configMap:
      name: k6-hpa-test-scenario
      file: k6-hpa-photo-only.js

  runner:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

  arguments: >
    -e USERS=1000
    -e DURATION=2m
    -e TIMEOUT=10s
    -e WRITES_PER_SEC=0.1
    # 기본: gateway의 /photo/ 경로를 통해 photo로 라우팅 (실무 E2E에 가까움)
    -e PHOTO_URL=http://service-gateway.gateway.svc.cluster.local/photo/
    # 아래 2개는 photo 서비스 업로드 API에 맞춰 조정하세요.
    # -e PHOTO_WRITE_PATH=upload
    # -e PHOTO_FILE_FIELD=file
    -e HOST_HEADER=api.yongun.shop
