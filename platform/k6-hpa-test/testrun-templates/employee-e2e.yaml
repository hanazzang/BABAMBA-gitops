apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: employee-e2e
  namespace: k6
spec:
  parallelism: 10
  cleanup: post
  paused: false
  quiet: false

  script:
    configMap:
      name: k6-hpa-test-scenario
      file: k6-hpa-employee-multiid.js

  runner:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

  arguments: >
    -e TEST_MODE=e2e
    -e USERS=1000
    -e DURATION=2m
    -e TIMEOUT=10s
    -e GETS_PER_SEC=5
    -e WRITES_PER_SEC=0.2
    -e PHOTO_PCT=90
    -e POST_THEN_GET_PCT=100
    -e AUTH_BASE=http://auth-server-stable.auth.svc:5001
    -e AUTH_LOGIN_PATH=/auth/login
    -e HOST_HEADER=api.yongun.shop
    -e EMP_GET_URL=https://service-gateway.gateway.svc.cluster.local:443/employee/employees
    -e EMP_WRITE_URL=https://service-gateway.gateway.svc.cluster.local:443/employee/employee
    -e USER_PREFIX=k6_user_
    -e PASS_PREFIX=k6_pass_
    -e USER_PAD=6
