apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-loki
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}-loki
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3100
      protocol: TCP
      name: http
    {{- if gt (int (.Values.replicas | default 1)) 1 }}
    - port: 7946
      targetPort: 7946
      protocol: TCP
      name: memberlist
    {{- end }}
  selector:
    app: {{ .Release.Name }}-loki

