image:
  repository: grafana/loki
  tag: "2.9.2"

namespace: monitoring

# Loki 컨테이너에 주입할 환경 변수(예: AWS_REGION) / Secret envFrom 등
extraEnv: []
extraEnvFrom: []

nameOverride: ""
fullnameOverride: ""

# 레플리카 수 (최소 메모리 사용을 위해 1로 설정)
replicas: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 3100

# 외부 게이트웨이(Service type: LoadBalancer or NodePort)
gateway:
  enabled: true
  type: NodePort      # 고정 노드포트로 단일 엔드포인트 노출
  port: 3100
  nodePort: 31000     # 필요한 경우 다른 포트로 조정
  annotations: {}

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

persistence:
  # 임시(노드 로컬)로 빠르게 돌리고 싶으면 enabled=false + useEmptyDir=true 로 사용합니다.
  # 운영/안정성 우선이면 enabled=true 로 PVC를 붙이는 것을 권장합니다.
  enabled: false
  # enabled=false일 때 /loki를 emptyDir로 마운트할지 여부
  useEmptyDir: true
  # enabled=false + useEmptyDir=true일 때 emptyDir 최대 크기(선택)
  emptyDirSize: 10Gi
  # 이미 만들어둔 PVC를 붙일 경우 이름만 지정 (예: loki-loki-pvc)
  existingClaim: ""
  size: 10Gi
  accessModes:
    - ReadWriteOnce
  # PVC 사용 시(StorageClass가 있을 때)만 설정하세요. (빈 값이면 생략됨)
  storageClassName: ""
  reclaimPolicy: Retain
  nfs:
    # NFS PV 자동생성 옵션 (RGW(S3) 구성에서는 사용하지 않으므로 false 권장)
    createPV: false
    server: ""
    path: ""
# nodeSelector (worker 전용 배치 가능)
nodeSelector: {}

# WAL 설정 (업로드 전 로그 내구성 보강)
wal:
  enabled: true
  path: /var/loki/wal
  emptyDirSize: 2Gi  # 실무 표준 크기

# Pod 분산/고가용성 위한 기본 anti-affinity (호스트 단위 분산)
affinity: {}

config:
  auth_enabled: false
  server:
    http_listen_port: 3100
  common:
    path_prefix: /loki
    # 단일 Loki(1 replica) 구성에서는 write replication을 1로 맞춰야 합니다.
    # (그렇지 않으면 "at least 2 live replicas required" 500이 발생)
    replication_factor: 1
    ring:
      kvstore:
        store: inmemory
  schema_config:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage_config:
    tsdb_shipper:
      active_index_directory: /loki/tsdb-index
      cache_location: /loki/tsdb-cache
    filesystem:
      directory: /loki/chunks

  # Compactor/보관주기 실제 삭제 동작 설정
  compactor:
    working_directory: /loki/compactor
    shared_store: filesystem
    retention_enabled: true 

  limits_config:
    retention_period: 336h  # 14 days (실무 표준)
    max_query_length: 336h
    split_queries_by_interval: 24h
    ingestion_rate_mb: 10        # 실무 표준 수집 속도
    ingestion_burst_size_mb: 20  # 버스트 크기
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 10MB
    max_query_parallelism: 4    # 쿼리 병렬 처리
    max_concurrent_tail_requests: 4  # 동시 tail 요청

