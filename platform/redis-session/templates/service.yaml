apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.namespace | default "common" }}
spec:
  type: ExternalName
  # 리스트의 첫 번째 IP(192.168.13.169)를 목적지로 설정합니다.
  externalName: {{ (index .Values.sentinels 0).ip }}
  ports:
    - name: sentinel
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP