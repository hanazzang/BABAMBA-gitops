apiVersion: v1
kind: Endpoints
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.namespace | default "common" }}
  labels:
    # ArgoCD가 추적할 수 있도록 라벨을 명시적으로 추가
    app.kubernetes.io/name: redis-sentinel
    argocd.argoproj.io/instance: onprem-dev-redis-session
subsets:
  - addresses:
{{- range .Values.sentinels }}
      - ip: {{ .ip | quote }}
{{- end }}
    ports:
      - name: sentinel
        port: {{ .Values.service.port }}
        protocol: TCP