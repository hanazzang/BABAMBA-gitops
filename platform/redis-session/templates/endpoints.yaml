apiVersion: v1
kind: Endpoints
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.namespace | default "common" }}
subsets:
  - addresses:
{{- range .Values.sentinels }}
      - ip: {{ .ip | quote }}
{{- end }}
    ports:
      - name: sentinel
        port: {{ .Values.service.port }}
        protocol: TCP