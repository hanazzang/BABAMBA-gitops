{{- if .Values.monitoring.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ .Values.envoyProxy.name | quote }}
  namespace: {{ .Values.envoyProxy.namespace | quote }}
  annotations:
    # kube-prometheus-stack(CRD 설치) 이후에 생성되도록 순서를 뒤로 미룹니다.
    argocd.argoproj.io/sync-wave: "6"
  labels:
    {{- with .Values.monitoring.prometheusReleaseLabel }}
    release: {{ . | quote }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- if .Values.envoyProxy.podLabels }}
{{ toYaml .Values.envoyProxy.podLabels | nindent 6 }}
      {{- else }}
      app: {{ .Values.envoyProxy.name | quote }}
      {{- end }}
  podMetricsEndpoints:
    - path: {{ .Values.monitoring.podMonitor.path | default "/stats/prometheus" }}
      interval: {{ .Values.monitoring.podMonitor.interval | default "15s" }}
      scrapeTimeout: {{ .Values.monitoring.podMonitor.scrapeTimeout | default "10s" }}
      targetPort: {{ .Values.monitoring.podMonitor.targetPort | default 19000 }}
      relabelings:
        # PromQL에서 일관되게 app 라벨을 쓰기 위한 매핑
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: app
        - sourceLabels: [__meta_kubernetes_pod_label_app]
          targetLabel: app
{{- end }}

