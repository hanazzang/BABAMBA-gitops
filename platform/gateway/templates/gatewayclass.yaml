apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.gatewayClassName | default "envoy" | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: {{ .Values.envoyProxy.name | quote }}
    namespace: {{ .Values.envoyProxy.namespace | quote }}
