apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-health
  namespace: gateway
  labels:
    app: gateway-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-health
  template:
    metadata:
      labels:
        app: gateway-health
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=ok"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10