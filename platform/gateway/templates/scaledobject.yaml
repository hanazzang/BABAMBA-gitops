{{- if and .Values.autoscaling.enabled .Values.keda.enabled (gt (len .Values.keda.triggers) 0) }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ printf "%s-dataplane" .Values.envoyProxy.name | quote }}
  namespace: {{ .Values.envoyProxy.namespace | quote }}
  annotations:
    # KEDA(CRD 설치) 이후에 생성되도록 순서를 뒤로 미룹니다.
    argocd.argoproj.io/sync-wave: "7"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ (.Values.envoyProxy.deploymentName | default .Values.envoyProxy.name) | quote }}

  pollingInterval: {{ .Values.keda.pollingInterval | default 15 }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod | default 300 }}
  minReplicaCount: {{ .Values.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.maxReplicas }}

  advanced:
    horizontalPodAutoscalerConfig:
      {{- with .Values.autoscaling.behavior }}
      behavior:{{ toYaml . | nindent 8 }}
      {{- end }}

  triggers:
    {{- range $t := .Values.keda.triggers }}
    - type: {{ $t.type | quote }}
      {{- with $t.metricType }}
      metricType: {{ . | quote }}
      {{- end }}
      metadata:
        {{- range $k, $v := $t.metadata }}
        {{ $k }}: {{ tpl ($v | toString) $ | quote }}
        {{- end }}
    {{- end }}
{{- end }}

