apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: thanos-receive
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-receive
spec:
  serviceName: thanos-receive-hl
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-receive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-receive
    spec:
      containers:
        - name: thanos
          image: quay.io/thanos/thanos:v0.37.2
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          args:
            - receive
            - --log.level=info
            - --tsdb.path=/data
            - --receive.hashrings-file=/etc/thanos/hashring.json
            - --receive.replication-factor=1
            - --label=receive_cluster="onprem-dev"
            - --label=receive_replica="$(POD_NAME)"
            - --remote-write.address=0.0.0.0:19291
            - --grpc-address=0.0.0.0:10901
            - --http-address=0.0.0.0:10902
          ports:
            - name: remote-write
              containerPort: 19291
            - name: grpc
              containerPort: 10901
            - name: http
              containerPort: 10902
          volumeMounts:
            - name: data
              mountPath: /data
            - name: hashring
              mountPath: /etc/thanos
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: data
          emptyDir: {}
        - name: hashring
          configMap:
            name: thanos-receive-hashring
