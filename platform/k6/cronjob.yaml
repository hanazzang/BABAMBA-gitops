apiVersion: batch/v1
kind: CronJob
metadata:
  name: photo-k6-hourly-test
  namespace: k6
spec:
  schedule: "0 * * * *" # 매 시간 정각
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: k6
            image: grafana/k6:latest
            command: ["k6", "run", "/scripts/photo-load-test.js"]
            volumeMounts:
            - name: k6-script
              mountPath: /scripts
          restartPolicy: OnFailure
          volumes:
          - name: k6-script
            configMap:
              name: k6-scenario-config # clusters/platform/k6/photo-load-test.js 내용이 담긴 CM