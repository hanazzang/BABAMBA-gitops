replicaCount: 1
namespace: "common"

image:
  repository: redis
  tag: "7"
  pullPolicy: IfNotPresent

service:
  name: "redis-cache-service"
  port: 6379

labels:
  app: "redis-cache"
  
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 300m

redis:
  maxmemory: "384mb"
  maxmemoryPolicy: "allkeys-lru"
  # auth/employee에서 기본으로 kosa1004를 사용 (common/redis_config.py)
  password: "kosa1004"