kube-prometheus-stack:
  # 🔴 지금 sync 막던 admission webhook은 끈다 (목표와 무관)
  prometheusOperator:
    admissionWebhooks:
      enabled: false
      patch:
        enabled: false

  # ✅ Prometheus만 확실히 스케줄되게 하면 목표 달성
  prometheus:
    prometheusSpec:
      storageSpec:
        emptyDir: {}

      tolerations:
        - key: spot
          operator: Exists

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 1Gi

  # ✅ HPA 메트릭의 핵심
  kube-state-metrics:
    enabled: true
    tolerations:
      - key: spot
        operator: Exists

  # ❌ 목표 달성에는 불필요 → 끔
  alertmanager:
    enabled: false
