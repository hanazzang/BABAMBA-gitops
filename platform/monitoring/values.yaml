kube-prometheus-stack:
  grafana:
    enabled: true
    adminPassword: admin
    service:
      type: ClusterIP

  kube-state-metrics:
    enabled: true

  prometheus-node-exporter:
    enabled: true

  prometheus:
    prometheusSpec:
      retention: 7d
      scrapeInterval: 15s
      evaluationInterval: 15s
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      podMonitorSelector: {}
      ruleSelector: {}

  alertmanager:
    enabled: true
