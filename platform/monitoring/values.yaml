kube-prometheus-stack:
  prometheusOperator:
    tolerations:
      - key: "spot"
        operator: "Exists"
    admissionWebhooks:
      patch:
        tolerations:
          - key: "spot"
            operator: "Exists"

  prometheus:
    prometheusSpec:
      tolerations:
        - key: "spot"
          operator: "Exists"

      # (이미 적용한 emptyDir/리소스/셀렉터 설정은 그대로 유지)
      storageSpec:
        emptyDir: {}

  alertmanager:
    alertmanagerSpec:
      tolerations:
        - key: "spot"
          operator: "Exists"

      storage:
        emptyDir: {}

  kube-state-metrics:
    tolerations:
      - key: "spot"
        operator: "Exists"

  prometheus-node-exporter:
    tolerations:
      - key: "spot"
        operator: "Exists"
