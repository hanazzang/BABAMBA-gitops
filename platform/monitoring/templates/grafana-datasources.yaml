apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-custom
  namespace: monitoring
  labels:
    # 이 라벨이 붙어 있어야 그라파나 사이드카가 "내꺼구나" 하고 가져갑니다.
    grafana_datasource: "1"
data:
  datasources.yaml: |-
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      access: proxy
      url: http://onprem-dev-monitoring-kube-prometheus.monitoring.svc:9090
      isDefault: true
      jsonData:
        timeInterval: 30s
    - name: Loki
      type: loki
      access: proxy
      url: http://onprem-dev-loki-loki.loki.svc.cluster.local:3100
      isDefault: false