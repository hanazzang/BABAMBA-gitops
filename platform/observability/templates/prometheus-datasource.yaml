apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-prometheus
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |-
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://{{ .Release.Name | replace "observability" "monitoring" }}-kube-prometheus.monitoring.svc:9090
      access: proxy
      isDefault: true
      jsonData:
        timeInterval: 30s