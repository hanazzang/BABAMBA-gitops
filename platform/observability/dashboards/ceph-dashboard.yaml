apiVersion: v1
kind: ConfigMap
metadata:
  # 1. ConfigMap 이름 구분
  name: grafana-dashboard-ceph-custom
  namespace: monitoring
  labels:
    # 2. 그라파나 자동 등록 라벨
    grafana_dashboard: "1"
  annotations:
    # 3. 같은 폴더에 묶이도록 설정
    grafana_folder: "loadtest"
data:
  # 4. 파일명 구분
  ceph-dashboard.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 99,
          "title": "클러스터 건강 상태 (Cluster Health)",
          "type": "row",
          "collapsed": false
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "HEALTH_OK", "color": "green" }, "1": { "text": "WARNING", "color": "yellow" }, "2": { "text": "ERROR", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "#EAB839", "value": 1 },
                  { "color": "red", "value": 2 }
                ]
              }
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": {}
          },
          "targets": [
            {
              "expr": "ceph_health_status",
              "legendFormat": "Status",
              "refId": "A"
            }
          ],
          "title": "현재 건강 상태",
          "type": "stat",
          "description": "0: 정상, 1: 경고(복구중 등), 2: 에러(다운)"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "#EAB839", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "(ceph_cluster_total_used_bytes / ceph_cluster_total_bytes) * 100",
              "legendFormat": "Used %",
              "refId": "A"
            }
          ],
          "title": "스토리지 사용률 (Usage)",
          "type": "gauge",
          "description": "전체 클러스터 용량 대비 사용량"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "unit": "short"
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 1 },
          "id": 3,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value"
          },
          "targets": [
            {
              "expr": "count(ceph_osd_up)",
              "legendFormat": "Live OSDs",
              "refId": "A"
            }
          ],
          "title": "가동 중인 디스크 (Active OSDs)",
          "type": "stat",
          "description": "현재 살아서 작동 중인 OSD 개수"
        },
        {
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 98,
          "title": "자가 치유 및 성능 (Self-Healing & Performance)",
          "type": "row",
          "collapsed": false
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "lineInterpolation": "linear",
                "lineWidth": 3,
                "spanNulls": false
              },
              "unit": "binBps"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 8 },
          "id": 4,
          "options": {
            "legend": { "calcs": ["max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "expr": "sum(rate(ceph_osd_recovery_bytes[1m]))",
              "legendFormat": "Recovery Speed (복구 속도)",
              "refId": "A"
            }
          ],
          "title": "자동 복구 속도 (Recovery Throughput)",
          "type": "timeseries",
          "description": "★핵심: 장애 발생 시 이 그래프가 치솟아야 정상입니다. (자가 치유 중이라는 뜻)"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "spanNulls": false
              },
              "unit": "iops"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 8 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum(rate(ceph_osd_op_r[1m]))",
              "legendFormat": "Read IOPS",
              "refId": "A"
            },
            {
              "expr": "sum(rate(ceph_osd_op_w[1m]))",
              "legendFormat": "Write IOPS",
              "refId": "B"
            }
          ],
          "title": "스토리지 처리 성능 (Cluster IOPS)",
          "type": "timeseries",
          "description": "클러스터 전체의 읽기/쓰기 작업량"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["ceph", "storage", "recovery"],
      "templating": {
        "list": []
      },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Ceph 스토리지 & 복구 모니터링",
      "uid": "ceph-custom-v1",
      "version": 1,
      "weekStart": ""
    }