apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.metallb.poolName | quote }}
  namespace: {{ .Values.metallb.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  addresses:
{{- toYaml .Values.metallb.addresses | nindent 4 }}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ .Values.metallb.l2AdvertisementName | quote }}
  namespace: {{ .Values.metallb.namespace | quote }}
spec:
  ipAddressPools:
    - {{ .Values.metallb.poolName | quote }}