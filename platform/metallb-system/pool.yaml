apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: onprem-dev-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.90.240-192.168.90.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: onprem-dev-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - onprem-dev-pool