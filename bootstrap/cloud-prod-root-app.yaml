apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-prod-root-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/hanazzang/BABAMBA-gitops
    targetRevision: refactor/gitops-structure
    path: applicationsets/cloud-prod
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
