apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-prod-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hanazzang/BABAMBA-gitops
    targetRevision: hana
    path: .
    directory:
      recurse: true
      include: '{applications/cloud-prod/*.yaml,applicationsets/cloud-prod/*.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
